body:
  text: 甲丙亦必等於甲艮畀今所言四率比例式其第二率若以相等之丁土畀代之其第四率若以相等之甲艮畀代之其式為以丁辛畀比丁土畀若甲壬畀與甲艮畀夫丁辛與丁土之比例原若甲壬與甲艮之比例比四綫既可比例則四綫之四畀亦必可以比例是比式之四率比例猶之科以丁辛畀比丁土畀若甲壬畀與甲艮畀也比則撱圓內諸直綫與平圓內諸直綫比例皆同之故也拋物綫規綫解曰準撱圓論之以大徑為首率小徑為中率求得未率為規綫今拋物綫式既為撱圓之極式其長無竟無首率大徑可言無中率小徑可言何從而施連比例術乎然首率中率雖不可知而以首率除中率畀所得之未率則可知其法任用曲綫上一點之橫直綫攷其為何等比例假如考得直綫畀為橫綫之四倍則小半徑畀亦必為大半徑之四倍即小徑畀亦必為大徑之四倍雖大小徑為無窮數而以無窮小徑自之無窮大徑除之必得未率四為通徑是拋物綫之通徑不可知而仍可知也葢大小徑之比例與橫直綫相同若擴充撱圓令
