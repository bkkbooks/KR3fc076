body:
  text: 立亦無不可諸股之頂既皆相平諸股皆在中心直線上皆自丁點起故諸股之頂皆相平則易丁石為午石易丁甘為午甘易丁物為午物諸斜線俱以次易為直線諸午點亦必相平而諸午點必攢成一撱圓周後另有解是此石地線上所斜截之撱圓無異於撱圓柱上之所斜截也夫以常理論之斜截圓柱為撱圓面斜截撱圓柱仍為撱圓面今圓錐上所斜截之面既等於撱圓術上所斜截之面則此截面必為撱圓面無疑矣諸午點何以必攢成撱圓周也試平分石地於天於天點上作草山柳橫線與亥丑平行復自石作石灰線亦與亥丑平行石天與天地既等石地與草栁又為斜交線則石天草角與地天山角必等兩角既等石天與天地又等則女天與天栁亦不能不等譬如同比例之兩勾股形兩弦既等兩股自不得不等而石女草形亦必等於地栁山形其草女亦必等於山栁而草山與石灰亦不能不等今諸午點所攢成圓周形其午牛斗午徑同於石灰即同於草山自天點穿出錐後面即如午房牛徑而天山小於草天則令草山為正圓徑草山上所截面為正圓面天山必為正矢草天必為大矢其通弦即午房午然則午牛斗午如圓徑午房午如通弦矣通弦必小於圓徑故午房午
