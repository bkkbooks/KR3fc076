body:
  text: 右二術刻意求之殊不可得因雙曲綫求殼立法必繁不能不分級數而求級之招差須以半心差畀乘半徑畀除又餘弦畀乘半徑畀除以降其位今雙曲綫之半心差與餘弦俱大於半徑若用為乘除法則位數不惟不降而反升矣且以撱圓例之凡求殼必先求餘弦上殼用減半球殼為葢殼而雙綫之正餘兩弧無理可通何能易餘為正乎若用正弦正矢以逕求葢殼則乘除之例尤多轇轕因闕此二題以俟明算之君子補綴焉雙曲線求全面積新定以上弧為界作橫綫至左右二弧止又以下弧為界作橫線至左右二弧止中間所截一叚囗形為雙曲線全面積或以左右二直綫截得囗形形異而積必同大小徑相乘為第一數負次置第一數二除之三除之為第二數負次置第二數一乘之三乘之四除之五除之為第三數正次置第三數三乘之五乘之六除之七除之為第四數負順是以下皆如是求至單位下止乃正負并減為雙曲線全面積負雙曲綫求半弧矢積術新定本正弦與本正矢相乘為第一數負次置第一數以本正弦畀乘之本半徑畀弦與大徑平行則用大半徑畀與小徑平行則用小半徑畀除
