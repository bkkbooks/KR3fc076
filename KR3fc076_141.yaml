body:
  text: 論諸曲綫式之法綫切綫第八凡自切點作綫與切綫正交為法綫平方法綫即半徑撱圓拋物綫雙曲綫之法綫俱平分切點距二心綫之交角先解拋物綫式如圖任於曲綫外作酉已戍切綫切點在已自切點作已卯法綫令與酉已戍為正交乃自針心午點向切點已作已午帶徑又自切點已令與橫軸平行作已亥綫三應自己點作綫抵右心令右心遠至無量故已亥橫軸平行則已夘法綫必平分午已亥角為二午已夘角與亥已夘角心等其故何也據第三論言之其已午恒等於已丁今西已夘既為句股形酉未已亦為同比例句股形設於酉未已形內作一未子垂綫則此綫必與已夘法綫平行子點左右之未子已及未子酉兩角必皆為真角今移此垂線令不從未起而從針心午起復令與已夘法綫平行作午乙綫其乙點左右之午乙已及午乙酉兩角亦必皆為直角矣夫已午原等於已丁已午乙形之乙角既為直角則已丁乙形之乙角亦必為直角引長午乙必至於丁因午乙必等於乙丁即已乙為均分午已丁角之垂綫即午丁為其底也夫午乙原與已夘法綫平
