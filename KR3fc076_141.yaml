body:
  text: 論諸曲線式之法線切線第八凡自切點作線與切線正交為法線平方法線即半徑撱圓拋物線雙曲線之法線俱平分切點距二心線之交角先解拋物線式如圖任於曲線外作酉已戍切線切點在已自切點作已卯法線令與酉已戍為正交乃自針心午點向切點已作已午帶徑又自切點已令與橫軸平行作已亥線三應自己點作線抵右心令右心遠至無量故已亥橫軸平行則已卯法線必平分午已亥角為二午已卯角與亥已卯角心等其故何也據第三論言之其已午恆等於已丁今西已卯既為句股形酉未已亦為同比例句股形設於酉未已形內作一未子垂線則此線必與已卯法線平行子點左右之未子已及未子酉兩角必皆為真角今移此垂線令不從未起而從針心午起復令與已卯法線平行作午乙線其乙點左右之午乙已及午乙酉兩角亦必皆為直角矣夫已午原等於已丁已午乙形之乙角既為直角則已丁乙形之乙角亦必為直角引長午乙必至於丁因午乙必等於乙丁即已乙為均分午已丁角之垂線即午丁為其底也夫午乙原與已卯法線平
