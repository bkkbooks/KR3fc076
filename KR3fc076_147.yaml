body:
  text: 午酉亦必等夫午甲與甲丑本相等則於未丑內去甲丑得未甲於午酉內去午甲得甲酉此二線亦必等惟未甲與甲酉等故未酉次切線恆平分於頂點甲凡切點上縱線底與法線底之距為次法線拋物線之次法線恆等於半通徑解曰準拋物線法線圖午丁與己卯平行己西既與己午等則已午懷卯午亦不能不等即卯午與未丑亦不能不等夫午丑本等於半通徑則卯午與未丑內各去一未午所餘之卯未必與午丑等即卯未與半通徑等五曲線求四直線術凡平圓正雙線以餘弦除正弦畀為次切餘弦為次法正弦為股次切為勾勾股求弦得切線正弦為股次法為勾勾股求弦得法線凡撱圓斜雙線以正弦畀乘大半徑畀為實餘弦乘小半徑畀為法除之得次切又以餘弦乘小半徑畀為實大半徑畀為法除之得次法如前得切線法線凡拋物線以倍矢為次切半通徑為次法如前得切線法線以上俱以大徑為橫小徑為直餘弦為橫正弦為直
