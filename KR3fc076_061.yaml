body:
  text: 論諸曲線始於一點終於一點第一諸曲線之形始於一點變點而成線線漸濶而成大小徑漸等諸撱圓至大小徑等而成平圓又變而為大小徑漸不等撱圓至大小徑不等之極而成拋物線即一乘拋物線又漸而成雙曲線以至無窮雙曲線愈截至邊則形愈狹狹之至而復成一點故點也線也平圓也撱圓也拋物線也雙曲線也形不同而得形之原無不同也原者何一點也數於何生生於圓錐凡圓錐上諸曲線式若同在此一點上截下則其通徑皆同如下圓甲點上所截無數曲線式俱以甲丁橫線為通徑解曰試作丑卯辛午圓錐體圖此圓錐之底徑卯午與丑卯丑午等以各種截法截之皆自甲點截起第一截法自甲截至金甲金線在圓錐體外為無線可截所截者仍只一甲點此謂始於一點也金點漸移而至左丑點上自由甲截至丑為無面可截所截者仍只一甲丑線此謂變點而成線也又自甲截至天則有截面此截面必為撱圓面另解在後其大小徑甚不等又自甲截至人所截面亦必為撱圓面其大小徑漸相
