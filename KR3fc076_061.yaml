body:
  text: 論諸曲綫始於一點終於一點第一諸曲線之形始於一點變點而成綫綫漸濶而成大小徑漸等諸撱圓至大小徑等而成平圓又變而為大小徑漸不等撱圓至大小徑不等之極而成拋物綫即一乘拋物綫又漸而成雙曲綫以至無窮雙曲綫愈截至邊則形愈狹狹之至而復成一點故點也綫也平圓也撱圓也拋物綫也雙曲綫也形不同而得形之原無不同也原者何一點也數於何生生於圓錐凡圓錐上諸曲綫式若同在此一點上截下則其通徑皆同如下圓甲點上所截無數曲綫式俱以甲丁橫綫為通徑解曰試作丑卯辛午圓錐體圖此圓錐之底徑卯午與丑卯丑午等以各種截法截之皆自甲點截起第一截法自甲截至金甲金綫在圓錐體外為無綫可截所截者仍只一甲點此謂始於一點也金點漸移而至左丑點上自由甲截至丑為無面可截所截者仍衹一甲丑綫此謂變點而成綫也又自甲截至天則有截面此截面必為撱圓面另解在後其大小徑甚不等又自甲截至人所截面亦必為撱圓面其大小徑漸相
