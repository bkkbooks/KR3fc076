body:
  text: 之六除之十一除之為第四數順是以下皆如是求至單位下止乃相并為總第三數置半心差五乘方以撱正弦六乘方乘之撱半徑十一乘方除之二而一又四而一又六而一七除之為第一數次置第一數以撱正弦畀乘之撱半徑畀除之一乘之七乘之二除之九除之為第二數次置第二數以撱正弦畀乘之撱半徑畀除之三乘之九乘之四除之十一除之為第三數次置第三數以撱正弦畀乘之撱半徑畀除之五乘之十一乘之六除之十三除之為第四數順是以下皆如是求至單位下止乃相并為總第四數如是疊次求之求得總數降至單位下止乃以諸總數正負并減為撱圓弧背卵體撱圓高為大徑腰圍為小徑平圓求全殼積術本代徽積拾級大小二半徑相乘平圓周率即徑一之平圓周乘之四為第一數正次置第一數以半心差畀乘之大半徑畀除之二除之三除之為第二數負次置第二數以半心差畀乘之大半徑畀除之一乘之三乘之四除之五除之為第三數負次置第三數以半心差畀乘之大半徑畀除之三乘之五乘之六除之七除之為第四數負順是以下皆如是求至單位下止乃正負并減為卵體撱圓之全殼積
