body:
  text: 論諸曲線式皆有準線第三凡曲式之準線皆在曲線式之外平圓準線為倍徑之周仍以圓心為心撱圓準線為倍大徑之平圓周以任一心為心拋物線準線為一直線凡曲線上任一點抵心與抵準線之二線必相等平圓準線何以為倍徑之周而仍以圓心為心也解曰先作子辰土寅平圓復取寅卯如寅心以心為心卯為界作外圓周此外圓周即為準線於內圓周子點上作線至心又自子點作線至丑子心必與子丑等餘可類推故倍徑圓周為本平圓準線也撱圓準線何以為倍大徑之平圓周而以任一心為心也解曰如圖甲金水火撱圓二偏心在左右今取火木如左火以右心為心木為界作一平圓於外此平圓即為準線於撱周甲點上
  hash: sha256:9a530266e551a61cb78806d6dc4c3825273f1f921a093ad03f563ae4580b9429
