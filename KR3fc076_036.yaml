body:
  text: 之二除之三除之為第二數正次置第二數以本正弦畀乘之本半徑畀除之一乘之三乘之四除之五除之為第三數負次置第三數以本正弦畀乘之本半徑畀除之三乘之五乘之六除之七除之為第四數正順是以下皆如是求至單位下止乃正負并減為雙曲線半弧矢積負鍾體雙曲線求全體積術新定此形係左右相合為一體也試截得蓋體令蓋之底面上平圓徑同於小徑左右二弧體俱如是截之乃以兩截面相合為雙曲線全體小通徑大徑除小徑畀之數乘大半徑上心距頂為初底心距頂乘之二除之為平錐負小半徑畀與初底相減為次底心距頂乘之三除之為立錐負兩錐相加四除之三乘之為第一數負四分第一數之一二除之三除之為第二數負四分第二數之一九乘之四除之五除之為第三數負四分第三數之一二十五乘之六除之七除之為第四數負順是以下皆如是求至單位下止乃并而八之為鍾體雙曲線全體積負笠體雙曲線求全體積術新定截法如前惟截面上平圓徑同於大徑大通徑小徑除大徑畀之數乘小半徑上心距頂為初底心距頂乘之二除之為平錐負大半徑畀與初底相減為次底心
