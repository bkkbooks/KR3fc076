body:
  text: 論八線第十二平圓與正交雙線既為正負二式則體例俱宜相同故平圓有八線正交雙線亦有八線更增正餘二法線正交雙線何以亦有八線也如上圖正交雙線式壬亥為本弧卯己亥酉二徑相等亥中為半徑壬子為正弦子中為餘弦壬癸為正法線丑寅為餘法線子亥為正矢巳木為餘矢子酉為大夫矢壬為正切丑午為餘切正餘二切為十字正交癸庚為正割寅午為餘割凡乘除比例之法俱與平圓同惟平圓用加者此用減平圓用減者此用加又平圓比例用半徑者此式皆用正餘二法線因平圓之正法線餘法線皆為半徑之故兩者為異耳按子中餘弦必與丑木等故丑木即餘弦準此則正交雙線任二兌徑必皆為十字正交亦皆為相等惟兌徑與正徑長短不同有異於平圓耳其比例之例如左一正矢加半徑為餘弦與平圓加減異號一正矢大矢相乘開平方得正弦與平圓同
