body:
  text: 論八綫第十二平圓與正交雙綫既為正負二式則體例俱宜相同故平圓有八綫正交雙綫亦有八綫更增正餘二法綫正交雙綫何以亦有八綫也如上圖正交雙綫式壬亥為本弧夘己亥酉二徑相等亥中為半徑壬子為正弦子中為餘弦壬癸為正法綫丑寅為餘法綫子亥為正矢巳木為餘矢子酉為大夫矢壬為正切丑午為餘切正餘二切為十字正交癸庚為正割寅午為餘割凡乘除比例之法俱與平圓同惟平圓用加者此用減平圓用減者此用加又平圓比例用半徑者此式皆用正餘二法綫因平圓之正法綫餘法綫皆為半徑之故兩者為異耳按子中餘弦必與丑木等故丑木即餘弦準此則正交雙綫任二兌徑必皆為十字正交亦皆為相等惟兌徑與正徑長短不同有異於平圓耳其比例之例如左一正矢加半徑為餘弦與平圓加減異號一正矢大矢相乘開平方得正弦與平圓同
