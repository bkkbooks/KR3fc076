body:
  text: 五除之為第三數正矢乘第三數全徑除之二十五乘之六除之七除之為第四數順是以下皆如是求至單位下止乃相並為兩平圓弧背正矢求弧背術二本泰西杜氏正矢乘半徑二乘之為第一數正矢乘第一數全徑除之四乘之三除之四除之為第二數正矢乘第二數全徑除之十六乘之五除之六除之為第三數正矢乘第三數全徑除之三十六乘之七除之八除之為第四數順是以下皆如是求至單位下止乃相并為孤背之自乘數平方開之得弧背杜術弦求弧背則徑求之矢求弧背乃先求其畀用術不齊余嘗疑馬辛酉歲暮偶用西人微積分推得矢求弧另術可不求弧畀而徑得弧因思以弦求弧必更有一術可先求其弧畀者演之果又得一術其乘除數俱兩兩相同乃並列四術以見一理所通極錯綜亦極齊整也
