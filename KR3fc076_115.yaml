body:
  text: 兩心距小於大徑雙線兩心距大於大徑而其較俱為心距頂之倍一正減一反減所謂異其正負也撱圓規線上橫線自左趨右頂雙線規線上橫線自右趨左頂撱圓兩帶徑和恆等雙線兩帶徑較恆等無不兩兩相反信乎雙線為撱圓之反式也通徑減規線為一率右木為二率規線為三紡右火為四率此四率何以能為比例也解曰如圖甲乙丙雙線式準第四論令庚乙等於癸子通徑自辛過庚作辛丑無界線則丁乙癸丁戊丁必為連比例三率戊丁為規線以等通徑之庚乙減之餘為戊已已庚等於丁乙則以戊已比已庚必若戊丁與丁辛矣撱圓與雙線兩心距遠至無窮俱成拋物線者何也解曰先以雙線論之如前圖自左心壬向右式作壬寅壬辰諸線在式內者為寅卯辰午諸線設丁壬距遠至無
