body:
  text: 一以正法線平方加正切線平方開平方得正割線以正法線當半徑一以餘法線平方加餘切線平方開平方得餘割線以餘法線當半徑一以正切線比正法線若餘法線與餘切線以正餘二法線當半徑一以餘弦比正弦若正法線與正切線以正法線當半徑一以正弦比餘弦者餘法線與餘切線當餘法線當半徑一以正弦平方與餘弦平方相減開平方得半徑與平圓加減異號一正矢與大矢之較無不等於徑與平圓加減異號地圖易和為較一正矢加全徑為大矢與平圓加減異號一餘矢加半徑為正弦與平圓加減異號一餘矢餘大矢相乘開平方得餘弦與平圓同一以正法線比正弦若正割與正切以正法線當半徑一以餘法線比餘弦若餘割與餘切以餘法線當半徑
