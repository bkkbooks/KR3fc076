body:
  text: 甲午正方為等而子寅甲定長方原等於丙寅乙寅長方後有另解則丙寅乙寅長方與四午正方亦等矣又丙寅乙寅長方加甲定正方之總等於甲乙正方後有別解甲午甲寅二線二正方與甲乙正方亦等矣上文丙寅乙寅長方與甲午正方等故甲正午方可代丙寅乙寅長方也夫等甲乙之甲卯其正方原等於甲午卯午二正方甲乙正方又等甲午甲定二正方此兩句股形之甲卯甲乙兩弦既等兩甲午句又等則午卯與甲寅兩股自不得不等而甲寅原等於丁辰則卯午與丁辰亦不能不等矣又準撱圖之例作上下兩圖上圖於撱圓外切一大徑平圓下圖於撱圓內容一小徑平圓若取下圖火石等於上圖金木則下圖土石亦必等於上圖水木故前圖卯午等於丁辰即辛午亦必等於丑辰也第四解曰準前解前圖卯甲半大徑甲乙等正方為甲午卯午二正方之總甲丑小徑甲乙等正方為甲辰丑辰二正方之總是此大小二正徑二正方之和為甲午卯午甲辰丑辰四正方之總也又甲丁大兌徑正方為甲辰
