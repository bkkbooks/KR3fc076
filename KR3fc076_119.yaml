body:
  text: 論諸曲綫式之兌徑第六兌徑亦名相屬二徑凡諸曲綫式有正徑有兌徑正徑有二兌徑亦有二平圓兌徑仍如正徑撱圓任一點有大小兩兌徑兩兌徑和之最大者為相等二兌徑和最小者為兩正徑和雙曲綫任一點有大小兩兌徑兩兌徑和之歸大者為無窮數最小者為兩正徑和拋物綫不可得兩正徑亦不可得兩兌徑只可得大兌徑一端用與小兌徑平行諸綫諸式內與小兌徑平行諸綫必平分於大兌徑上與大兌徑平行諸綫必平分於小兌徑上平圓兌徑解曰如圖甲乙丙丁平圓甲丙乙丁為二正徑任於子點上作子丑寅夘二兌徑必仍與正徑等與寅夘平行之亢角斗井諸綫平分於牛於女皆為子丑兌徑所平分也撱圓兌徑解曰如圖戊已庚辛撱圓已辛為大正徑戊庚為小正徑任於午點上作過心綫午未為大兌徑又任作申酉綫與午未平行平分於天過天及心作戍亥綫為小兌徑與戍亥平行之張
