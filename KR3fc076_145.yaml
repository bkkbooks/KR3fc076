body:
  text: 必等火己酉角原等於酉己午角則戍己亥角亦必等於酉己午角矣於酉己卯直角內減去一酉己午角於戍已卯直角內減去一戍己亥角則所餘之午己卯亥己卯兩角必為相等故撱圓法線亦平分午己亥角也試更作雙線圖以明之己午與己丁等理詳第三論丁午平分於乙丁乙同乙午午已酉角亦必等於火己酉角如理前解而火己酉角與戍己亥角為戍酉火亥兩斜交線所成對角是此二角必等火己酉角原等於酉己午角則戍己亥角亦必等於酉己午角矣於酉己卯直角內減去一酉己午角於戍已卯直角內減去一戍己亥角則所餘之午己卯亥己卯兩角必為相等故雙線法線亦平分午己亥角也凡諸曲線式之切線亦平分切點距二心線之交角即前圖切線平分火己午角也凡切點縱線及切線二交軸點之距線為次切線拋物線之次切線必平分於頂點解曰準拋物線法線圖乙己午角既等於乙酉午角則己午與午酉亦不能不等已午原等於不丑則未丑與
