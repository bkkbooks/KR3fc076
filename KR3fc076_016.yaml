body:
  text: 一數正次置第一數以半心差畀乘之撱餘弦畀乘之大半徑三乘方除之二除之三除之為第二數正次置第二次以半心差畀乘之撱餘弦畀乘之大半徑三乘方除之一乘之三乘之四除之五除之為第三數負次置第三數以半心差畀乘之撱餘弦畀乘之大半徑三乘方除之三乘之五乘之六除之七除之為第四數正順是以下皆如是求至單位下止乃正負並減為餘弦上圍殼積以減半殼積為榼體撱圓之截蓋殼積撱圓求全面積術一本烏程徐氏撱圓廣袤相乘三之四而一為第一數四分第一數之一二除之三除之為第二數四分第二數之一九乘之四除之五除之為第三數四分第三數之一二十五乘之六除之七除之為第四數順是以下皆如是求至單位下止乃查並為撱圓全面積撱圓求全面積術二新定大小徑相乘為第一數正次置第一數二除之三除之為第二數負次置第二數一乘之三乘之四除之五除之為第三數負次置第三數三乘之五乘之六除之七除之為第四數負順是以下皆如是求至單位下止乃正負并減為撱圓全面積
