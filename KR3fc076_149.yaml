body:
  text: 論諸曲綫式之斜規綫第九斜規綫又名曲率徑凡正徑上有正規綫兌徑上亦有斜規綫第一斜規綫曰斜通徑其比例之式與正規綫同惟平圓斜規綫仍為圓徑先解撱圓如圖甲乙為大兌徑丙丁為小兌徑以甲乙為首率丙丁為中率求得土甲為未率即為斜通徑其甲戊壬戊庚戊必為連比例三率即甲乙癸己辛己亦為連比例三率此與正通徑之比例均同其故何也緣大兌徑上諸橫綫與本撱圓大正徑上諸橫綫無不相同即用兩兌徑為兩正徑如法作一撱圓所有斜通徑即為正通徑式內無數連比例亦必盡合試任作甲乙丙丁平行兩橫綫於其間作定丙丑正三角形又作夘子癸斜三角形此二形同以辛壬為高丙丑與子癸又復相同則相平之辰午與未申心同即酉戍與亥土金火與水木無不相同猶之大正徑上諸橫綫與小正徑上諸橫綫無不相同也設作庚亢如夘石己戊如子癸則庚己戊亦成一正三角形內斗女室昴房井三
