body:
  text: 撱圓面若子庚為甚徽數則丁庚綫上之撱圓面與丁子綫上之拋物綫面幾欲相合試以兩種截面繪於平面如第三圖危婁虛胃即前圖丁庚徑上撱圓面張畢危室星即前圖丁子軸上拋物綫面令虛危為極大撱大徑此撱圓式與拋物綫式雖不相合而室危畢與婁危胃則幾欲相合矣倘所函之撱圓愈長則撱弧與曲綫之合處愈多猶之丁庚愈近於丁子而合外愈多也至丁庚漸移而與丁子合一則此撱圓式有放無歛而必成拋物綫式然則拋物綫式者非撱圓之極式而何圓錐上斜截之面何以必為撱圓面也解曰如第四圖丁亥丑圓錐體自石至地斜截之此錐面上石地曲線必為撱圓半周線所以然者半周綫上諸斜綫如丁石丁甘丁物之類皆是斜倚皆為句股形之弦其股皆在圓錐中心直綫上諸股皆為直立而諸句股形之比例皆同比例既同則斜倚諸弦與中綫上諸股亦比例皆同若改斜倚諸弦為直
