body:
  text: 撱圓有相等二兌徑雙綫無之所以無者因雙綫之相等二兌徑即漸近綫也解曰雙綫兩兌徑和愈大則較愈小然終不能相等至成十字式二漸近綫然後能相等於無窮也雙綫作兌徑另法曰如圖雙曲綫形以十字相交之漸近綫限之以漸近綫為界作乙丙甲丁平行兩切綫又作乙甲丙丁平行兩切綫俱過心則寅卯二切點聯綫為大兌徑子丑二切點聯綫為小兌徑與子丑平行之寅加甲寅畀為甲乙畀猶之以寅土股方加甲寅句方為甲士弦方而甲土本等於甲乙故丙寅乘乙寅加甲寅畀為甲乙正方也雙曲綫二兌徑畀較恒等於二正徑畀較何也解曰雙綫為撱圓反式諸例皆同惟二正徑有正負之分耳撱圓兩正徑皆正即兩正徑畀皆正雙綫兩正徑一正一負即兩正徑畀亦一正一負即任兩兌徑與任兩兌徑之二畀無不為一正一負故撱圓以加為加而兩兌徑畀之和無不等雙綫以減為加而兩兌徑畀之較無不等也
