body:
  text: 論諸曲線式之兩心差第七平圓兩心差為無數拋物線兩心差為無窮數撱圓以兩正徑畀相減開平方為兩心差雙曲線以兩正徑畀相加開平方為兩心差正交雙曲線兩心差等於二徑上正方之斜線撱圓兩心差解曰先作甲庚乙辛撱又作一外切平圓自甲點上作丙戊切線與大徑平行交平圓周於丙戊二點又自乙點作丁已切線亦與大徑平行交平圓周於丁已二點未作丙丁直線截大徑於右作戊已直線截在徑於左則左右即兩心差夫中戊原等於大半徑左戊原等於小半徑今以中戊大半徑為弦左戊小半徑為句中左半心差為股故以勾畀減弦畀餘開平方為股畀若倍其勾股弦則大徑為勾兩心差為股比例亦同雙曲線兩心差解曰雙線之兩徑既一正一負則大徑畀小徑畀亦一正一負正負不同以加為減故兩徑畀相加開平方得兩心差也雙線兩心差解曰先作雙線四弧又作丙庚丁戊辛已兩弧為庚辛徑之正交雙線自甲點上作丙戊切線與
  hash: sha256:d12a9c1ba797c105d2a4b6a4e856c801fa1b870d0468b17d04afbaa0e2aeb4a8
