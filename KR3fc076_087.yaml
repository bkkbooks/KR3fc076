body:
  text: 得不為與軸平行之橫線矣又依前圖之例以右心為心作一式外平圓而拋線右心遠在不可窮極之外則平圓半徑之大為無量大而前圖壬木弧線亦為無量大夫一假弧線若大至無量必至變弧線為直線此拋物線之準線所以不為弧線而為直線也然則拋物準線之理固同於撱圓準線之理亦同於平圓準線之理也若二乘拋物之準線則不為直線而仍為曲線其曲處向右此曲準線名遲率曲線引而愈長則曲愈殺長之至則有似乎直線矣解曰遲率曲線者謂曲線內直線之長率愈大橫線之長率愈小也與拋物線正相似故各種拋物線亦可名之以遲率曲線惟此則易橫為直耳如圖壬卯亥二乘拋物線式午甲為橫軸乙為心癸甲為準線卯甲如乙
