body:
  text: 得不為與軸平行之橫綫矣又依前圖之例以右心為心作一式外平圓而拋綫右心遠在不可窮極之外則平圓半徑之大為無量大而前圖壬木弧線亦為無量大夫一叚弧綫若大至無量必至變弧線為直線此拋物綫之準綫所以不為弧綫而為直綫也然則拋物准綫之理固同於撱圓準線之理亦同於平圓準綫之理也若二乘拋物之准綫則不為直綫而仍為曲綫其曲處向右此曲準綫名遲率曲綫引而愈長則曲愈殺長之至則有似乎直綫矣解曰遲率曲綫者謂曲綫內直綫之長率愈大橫綫之長率愈小也與拋物綫正相似故各種拋物線亦可名之以遲率曲綫惟此則易橫為直耳如圖壬卯亥二乘拋物綫式午甲為橫軸乙為心癸甲為準綫卯甲如乙
