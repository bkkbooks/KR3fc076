body:
  text: 房虛危諸線平分於室於栁皆為午未兌徑所平分也雙線兌徑解曰如圖昴星尾雙線土婁為大正徑壁水為小正徑任於星點之上作過心線星火為大兌徑又任作胃觜線與星火平行平分於參過參及心作一線則木奎為小兌徑與木奎平行之萁鬼翌氐諸線平分於畢於軫皆為引長星火兌經所平分也拋物線兌徑解曰如圖甲乙丙拋物線乙已為大正徑一假任於卯點上作卯午橫線中心遠甚不能過故為橫線與乙己平行為大兌徑一假又作卯點切線戊庚與戊庚平行之辛壬未癸諸線平分於子於丑皆為卯午一假兌徑所平分也撱圓任何二兌徑二平方之和恆等於二正徑二平方之和雙曲線任何二兌徑二平方之較恆等於二正徑二平方之較撱圓二兌徑畀和恆等於二正徑畀和其理須作四次解之第一解曰凡撱圓任作大小二兌徑
