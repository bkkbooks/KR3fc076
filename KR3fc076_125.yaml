body:
  text: 午心本同準前例則丙午心必等於已巳心矣而已巳心又同於已未心故戊癸心甲壬心甲寅心庚子心庚土心丙卯心丙午心已巳心已未心諸三角形無不相等也第二解曰凡撱圓任一點之正切乘餘切必等於與切線平行半徑之畀其故何也試作乙子丙癸撱圓圖其辛丁乘丁壬必等於甲戊畀欲明其理先自甲心至切點丁作甲丁半徑則甲丁與甲戊亦相屬二半兌徑也次自西作丁巳正弦與子癸平行又自戊點與子癸平行作戊丑正弦而甲己丁甲丑戊二形為相等矣理詳本論第一解又自丁點與乙丙平行作丁庚線則甲丁已甲丁庚亦為相等甲丁已原與甲丑戊等則甲丁庚亦與甲丑戊等又辛已與丁已本若丁庚與壬庚又辛已與丁庚辛已丁形與甲丁庚形比例為同辛已丁形為半丁已乘辛已甲丁庚形為半丁已乘丁庚三四率乘法相同故可以比例以此推之則甲庚與壬庚甲丁庚形與壬丁庚形比例亦同雨三角形俱以丁庚為高其甲庚闊與壬庚闊又如一二率故可以相為比例而辛已與丁已之比例原若丁庚與壬庚之比例則隔而比之以辛已丁形比甲丁庚形必若甲丁庚形與壬
