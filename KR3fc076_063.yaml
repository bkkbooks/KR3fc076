body:
  text: 等又自甲平截至丁此截面必為正圓面其大小徑皆等又自甲斜截至乙此截面又為撱圓面其大小徑又復不等又自甲斜截至子此截面亦為撱圓面其大小徑愈不等又自甲截至丙令甲丙與丑午平行此式大小徑懸絕之極無大小徑可言則所截面必為拋物綫面又自甲截至火為雙曲綫面又自甲截至木亦為雙曲綫面其餘甲未甲申甲亥為無數雙曲線面惟甲山為直綫與甲丁為正交甲山上截面名雨徑較最小雙曲綫面下面愈截而向右則面式漸狹至於自甲截至卯則狹之至而還為甲卯一綫若自甲截至土則甲土綫又在圓錐體外亦無綫可截而所截者還為一甲點矣故一點者諸曲綫面之原也而撱圓與雙曲線俱以拋物綫為樞拋物綫之面何以必為撱圓之極也解曰職第二圖甲辛庚圓錐體若於圓錐上斜截之如自丁截至子令丁子與甲庚平行則丁子軸上所成平面必為拋物綫面葢圓錐之甲辛甲庚二斜綫可引長至無盡丁子亦與為無盡倘丁子稍不與甲庚平行而為丁庚則丁庚徑上所成之面不能成拋物線面而成
