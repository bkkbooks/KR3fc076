body:
  text: 距頂乘之三除之為立錐負兩錐相加四除之三乘之為等一數負四分第一數之一二除之三除之為第二數負四分第二數之一九乘之四餘之五除之為第三數負四分第三數之一二十五乘之六除之七除之為第四數負順是以下皆如是求至單位下止乃并而八之為笠體雙曲線全體積負按雙曲結諸術與撱圓諸術立術俱同不過正負有異耳惟撱圓求體用通徑乘半徑此則通徑乘心距頂似稍不同矣而仍可云同試置半徑二而一又四而三又六而五又八而七如是無窮級數并之必仍為半徑若改諸級數為正負相間則得數必為心距頂矣是心距頂之與半徑亦異正負而同數者也鍾體雙曲線求截蓋體積術新定小通徑乘矢為初底天乘之二除之為平錐負正弦畀與初底相減為次底矢乘之三除之為立錐負兩錐相加四除之三乘之為第一數負四分第一數之一二除之三除之為第二數負四分第二數之一九乘之四除之五除之為第三數負四分第三數之一二十五乘之六除之七除之為第四數負順是以下皆如是求至單位下止乃并而四之為鍾體雙曲線截蓋體積負
