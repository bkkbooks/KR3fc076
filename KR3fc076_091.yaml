body:
  text: 綫亦與為無窮所以前圖拋物綫之乘數雖多而乙戊準綫斷不能測其長短也今所言拋物綫式既上下曲綫相合為一橫綫則其心必在橫綫左端而橫綫無廣狹可言即準線亦無長短可言而一橫綫之準綫亦必為橫綫左端之一點矣若雙曲綫之準綫仍為平圓弧綫而弧之曲乃向左與撱圓準綫之曲向右者正相麼故雙曲線撱圓之反式也解曰如圖戊午庚雙綫式此式與相等之辛申壬式相需為用故名雙綫式右左為兩心乙木為通徑寅卯同午申為雙綫徑子丑為直徑今取午未如右午以左心為心未為界作一平圓周此酉未亥平圓周綫即戊午庚式之準綫試任於曲線上丙點作綫至右心又自丙作綫至左心則丙右必等於丙水又試於丁點上作綫至右心又自丁作綫至左心則丁右必等於丁火故曲綫上任一點距兩心綫之較恒為酉未亥平圓之半徑也葢撱圓準綫上諸橫綫如第二圖戊壬丙庚諸綫恒自左而趨於右心雙綫上諸橫綫如本圖丙水丁火諸綫恒自右而趨於左心撱
