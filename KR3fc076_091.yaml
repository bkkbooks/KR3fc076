body:
  text: 線亦與為無窮所以前圖拋物線之乘數雖多而乙戊準線斷不能測其長短也今所言拋物線式既上下曲線相合為一橫線則其心必在橫線左端而橫線無廣狹可言即準線亦無長短可言而一橫線之準線亦必為橫線左端之一點矣若雙曲線之準線仍為平圓弧線而弧之曲乃向左與撱圓準線之曲向右者正相麼故雙曲線撱圓之反式也解曰如圖戊午庚雙線式此式與相等之辛申壬式相需為用故名雙線式右左為兩心乙木為通徑寅卯同午申為雙線徑子丑為直徑今取午未如右午以左心為心未為界作一平圓周此酉未亥平圓周線即戊午庚式之準線試任於曲線上丙點作線至右心又自丙作線至左心則丙右必等於丙水又試於丁點上作線至右心又自丁作線至左心則丁右必等於丁火故曲線上任一點距兩心線之較恆為酉未亥平圓之半徑也蓋撱圓準線上諸橫線如第二圖戊壬丙庚諸線恆自左而趨於右心雙線上諸橫線如本圖丙水丁火諸線恆自右而趨於左心撱
