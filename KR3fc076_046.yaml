body:
  text: 對數曲綫求任幾分對數曲綫術新定直綫為第一數正次置第一數根本對數根畀乘之直綫畀除之二除之為第二數負次置第二數根畀乘之直綫畀除之一乘之三除之四除之為第三數正次置第三數根畀乘之直綫畀除之九乘之五除之六除之為第四數負次置第四數根畀乘之直綫畀除之二十五乘之七除之八除之為第五數正順是以下皆如是求至單位下止乃正負并減為所求幾分曲綫右所求為正對數上曲綫凡用中國對數訥白爾對數俱可求若對數根太大者則越級而不可求橫綫為幾即曲綫為幾分可求整分不可求零分至求負對數上曲綫未演術求任幾分對數曲綫之面積術新定直綫乘本對數根即所求任幾分面積右所求亦正對數上面積
