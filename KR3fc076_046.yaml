body:
  text: 對數曲線求任幾分對數曲線術新定直線為第一數正次置第一數根本對數根畀乘之直線畀除之二除之為第二數負次置第二數根畀乘之直線畀除之一乘之三除之四除之為第三數正次置第三數根畀乘之直線畀除之九乘之五除之六除之為第四數負次置第四數根畀乘之直線畀除之二十五乘之七除之八除之為第五數正順是以下皆如是求至單位下止乃正負并減為所求幾分曲線右所求為正對數上曲線凡用中國對數訥白爾對數俱可求若對數根太大者則越級而不可求橫線為幾即曲線為幾分可求整分不可求零分至求負對數上曲線未演術求任幾分對數曲線之面積術新定直線乘本對數根即所求任幾分面積右所求亦正對數上面積
