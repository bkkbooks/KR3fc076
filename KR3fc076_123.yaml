body:
  text: 又作大小二兌徑其不相屬二兌徑之音兩三角形恒等其相連諸三角形無不皆等其故何也如前圖甲丙乙丁撱圓甲壬心三角形與戊癸心三角形此兩形同在甲乙戊己不相屬二兌徑之音兩三角形必相等即所有甲寅心庚子心庚土心丙卯心丙午心巳巳心己未心無不相等欲知其故試詳論之另作後圖申奎昴胃撱圓申昴為大兌徑奎胃為小兌徑試作申胃斜綫與申奎斜綫則申亢奎弧矢與申房胃弧矢二積必同若平分申奎於斗自心過斗作栁亢徑平分申胃於危自心過危作翌房徑又作申亢綫與申房綫則申亥亢弧矢與申酉房弧矢亦心等積又與申亢平行作酉壁綫與申房平行作亥觜綫則酉亥壁與亥酉觜二弧矢亦必相同即亥酉井半孤矢積與酉亥虛半弧矢積亦必相同於亥酉心面積內去一亥酉井為亥井心形去一酉亥虛為酉虛心形此亥井心酉虛心二三角形必為相等矣此前圖戊癸心形與甲壬心形所以必相等也甲壬心與甲寅心本同準前例則甲寅心必等於庚子心矣庚子心與庚土心本同準前例則庚土心必等於丙卯心矣丙卯心與丙
