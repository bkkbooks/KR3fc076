body:
  text: 論諸曲線式之心第二凡點為一心線為二心平圓象點故一心撱圓象線故二心各種拋物線象無窮長線故但得一心而不能得又一心雙曲線之本面亦只一心并對面一心為二心解曰平圓者一點之拓而大者也故其心仍在中平圓既與點同類則引長平圓為撱圓必與線同類線以兩端為兩心故撱圓亦有兩心惟點之位置恆在兩棱相輳尖鋒之處線之兩端為尖鋒故點在兩端撱圓兩端無尖鋒故兩心在圓內而不能在大徑兩端也至如各種拋物線其長無竟亦如無竟長之線只有一端而不得其又一端故亦只有一心也若拋物線乘數多至無量必至變成一線而其心為線端一點撱圓之有兩心猶人以兩目注視遠物其近物心岐而為二物二物仍一物也撱圓弧上任一點距兩心之和必如大徑此兩線仍為一線猶之乎岐視之二物仍為一物也然則撱圓之兩心亦猶平圓之一心矣
