body:
  text: 論諸曲線之縱橫線式第十諸曲線所以能成式者以縱線與橫線有此例之理也若以中點為原點曲線任一點抵橫軸為縱線中點抵縱線底點為橫線則平圓以縱線平方與橫線平方相加等於半徑平方正交雙曲線以縱線平方與橫線平方相減等於半徑平方撱圓以縱線平方乘大半徑平方得數橫線平方乘小半徑平方得數兩數相加等於大半徑平方乘小半徑平方雙曲線以縱線平方乘大半徑平方得數橫線平方乘小半徑平方得數兩數相減等於大半徑平方乘小半徑平方惟拋物線無其式平圓縱橫線式解曰平圓縱線為正弦橫線為餘弦以正弦畀加餘弦畀必得半徑畀即句股求弦也正交雙曲線縱橫線式解曰此式為平圓反式其橫直二徑為一正一負縱線與直徑為類橫線與橫徑為類故縱橫線亦一正一負即縱橫線之畀亦一正一負兩畀之正負異故以減為加而得半徑畀也撱圓縱橫線式解曰如圖甲中為大半徑乙中為小半徑己為曲線上任一點己未為縱線未中為橫線以己未乘甲中加未中乘乙中必等於甲中乘乙中其故何也試切撱圓作一大徑上平圓引長己未至平圓周上
  hash: sha256:f7da8fd80b2031e2f36342e8dd1f49a2b8440a35b582e15e8351a77c82d7002c
