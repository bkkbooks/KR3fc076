body:
  text: 數之一二十五乘之六除之七除之為第四數順是以下皆如是求至單位下止乃相并為拋物線截蓋殼積按右術必法線大於半通徑乃可若正弦小於半通徑則法線亦小於半通徑而不可求矣茲復立一術正弦愈小降位愈易亦以濟右術之窮也術如左拋物線截蓋殼積術二新定正弦自乘以平圓周率乘之為第一數正次置第一數以正弦畀乘之半通徑畀除之二除之四除之為第二數正次置第二數以正弦畀乘之半通徑畀除之一乘之六除之為第三數負次置第三數以正弦畀乘之半通徑畀除之三乘之八除之為第四數正次置第四數以正弦畀乘之半通徑畀除之五乘之十除之為第五數負順是以下皆如是求至單位下止乃正負并減為拋物線截蓋殼積凡正弦大於半通徑則此術不能求拋物線求半弧矢積術本代微積拾級正弦正矢相乘二乘之三除之為第一數下更無數即以第一數為拋物線半弧矢積拋物線求蓋體積術新定通徑乘矢又矢乘之二除之此即撱圓求體之平錐也因拋物線有平錐無立錐故徑置平維四而三為第一數又四除之三乘之為第一數四分第一數
