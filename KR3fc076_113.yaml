body:
  text: 方形又自中心乙向橫方四角各作斜引線長之作子丑寅卯二斜線此二線名漸近線如乙子為木亥曲線之界木亥漸引而長乙子亦漸引而長木亥曲線愈長愈與乙子線相近而終不能到乙子線上又上下補作兩雙線形則辰水午與戍土房俱不能到漸近線上未火申亦然設上下左右四曲線俱大至無量數則弧端八點如亥酉未申辰午戍房八點幾欲與漸近線遇而辰酉戍午未申房每二點幾欲合成一點是八點漸變為四點也此四點上作二橫線二直線聯成橫方形為無量大橫方形其橫直線亦為無量大橫直線此無量大橫線即雙線式大徑無量大直線即雙線式小徑準二次曲線例通徑必為大小二徑之中率今無量大橫直線之數雖不可知而無量大橫線與無量大直線之比例必等於木火與水土之比例則可知也比例既等則通徑可為無量大二徑之中率亦可為木火水土之中率矣故木火為雙曲線大徑水土為雙曲線小徑蓋舍其不可知之大小二徑而還用其可知之大小二徑也若按此大小二徑作一撱圓求得撱圓通徑必與雙線上通徑等依此論之撱圓有兩徑雙線亦有兩徑撱圓有兩心雙線亦有兩心撱圓雨頂點即撱大徑左右端二點相背雙線兩頂點相對撱圓兩徑在面積內雙線兩徑在面積外撱圓
