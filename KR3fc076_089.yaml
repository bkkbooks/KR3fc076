body:
  text: 卯其戊乙必與戊已等丁乙必與丁丙等庚乙必與庚辛等設引長午卯軸至未於已點上作已子直綫於丙點上作丙丑直綫於辛點上作辛寅直綫甲子甲丑甲寅三橫綫長數愈小已子丙丑辛寅三直線長數愈大若橫綫甚長則直線之長數尤速故長之至而有似乎直綫也若三乘以上拋物之準綫俱為遲率曲綫而其曲益殺解曰如圖為多乘拋物綫式丙為心此丙點幾近丁點取丁乙如丙丁則丁乙亦為甚微其戊已準綫仍曲向右而其曲甚微幾成直綫故拋物綫之乘數愈多而準綫愈有似手直綫也若拋物綫之乘數多至無量則曲綫漸直且漸合為一綫而其準綫亦縮為一點矣解曰如前圖多乘拋物綫式試作子丑寅卯辰午三直綫則寅卯必大於子丑辰午必大於寅卯惟上下曲綫綫與丙丁橫軸平行直綫之長數甚難然長數雖難而曲綫引長無已其直綫終能大至無窮直綫無窮則準
