body:
  text: 卯其戊乙必與戊已等丁乙必與丁丙等庚乙必與庚辛等設引長午卯軸至未於已點上作已子直線於丙點上作丙丑直線於辛點上作辛寅直線甲子甲丑甲寅三橫線長數愈小已子丙丑辛寅三直線長數愈大若橫線甚長則直線之長數尤速故長之至而有似乎直線也若三乘以上拋物之準線俱為遲率曲線而其曲益殺解曰如圖為多乘拋物線式丙為心此丙點幾近丁點取丁乙如丙丁則丁乙亦為甚微其戊已準線仍曲向右而其曲甚微幾成直線故拋物線之乘數愈多而準線愈有似手直線也若拋物線之乘數多至無量則曲線漸直且漸合為一線而其準線亦縮為一點矣解曰如前圖多乘拋物線式試作子丑寅卯辰午三直線則寅卯必大於子丑辰午必大於寅卯惟上下曲線線與丙丁橫軸平行直線之長數甚難然長數雖難而曲線引長無已其直線終能大至無窮直線無窮則準
