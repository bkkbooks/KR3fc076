body:
  text: 又一乘之二除之三除之為第二數次置第二數以撱正弦畀乘之撱半徑畀除之三乘之又三乘之四除之五除之為第三數次置第三數以撱正弦畀乘之撱半徑畀除之五乘之又五乘之六除之七除之為第四數順是以下皆如是求至單位下止乃相并為總第一數凡用大半徑畀者總第一數正以下均負用小半徑畀者總第一二數正以下負正相間置半心差自乘方以撱正弦立方乘之撱半徑三乘方除之二而一三除之為第一數次置第一數以撱正弦畀乘之撱半徑畀除之一乘之三乘之二除之五除之為第二數次置第二數以撱正弦畀乘之撱半徑畀除之三乘之五乘之四除之七除之為第三數次置第三數以撱正弦畀乘之撱半徑畀除之五乘之七乘之六除之九除之為第四數順是以下皆如是求至單位下止乃相并為總第二數置半心差三乘方以撱正弦四乘方乘之撱半徑七乘方除之二而一又四而一五除之為第一數次置第一數以撱正弦畀乘之撱半徑畀除之一乘之五乘之二除之七除之為第二數次置第二數以撱正弦畀乘之撱半徑畀除之三乘之七乘之四除之九除之為第三數次置第三數以撱正弦畀乘之撱半徑畀除之五乘之九乘
