body:
  text: 然則正矢正弦規線何以必為連比例三率也試以寅丁己寅庚寅三率之理解之如前圖己寅正弦截圓周於己自己點向乙作已乙線向丁作已丁線此乙已丁角必為直角而成句股形其已寅正弦為乙己丁句股形之垂線以寅丁比己寅若己寅與乙寅是丁寅已寅乙寅三線原為連比例三率也今戊丁既同於乙丁則庚寅亦同於乙寅而丁寅己寅庚寅三線亦必為邊比例三率矣餘可類推撱圓規線解早如圖寅卯辰丑撱圓卯丑為大徑寅辰為小徑試以卯丑為首率寅辰為中率求得未率子丑為通徑即為最大規線此子丑必等於於過酉心之申戊直線乃自卯至子作卯子斜線則午酉未亥等皆為遞短之規線用法以首率酉丑矢乘未率午酉規線開平方得中率申酉正弦又發首率亥丑矢乘未率未亥規線開平方得中率土亥正弦餘亦可類推然則撱圓之正矢正弦規線何以仍為連比例三率也如圖大徑乙丙小徑壬寅規線之最大乙戊此三線既為連比例則三率各取其半半首率得甲乙半中率得
