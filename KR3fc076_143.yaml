body:
  text: 行則午丁亦與巳夘法綫平行矣已丁與夘午本為平行午丁與巳夘又復平行則于丁與已卬必等而已丁與夘午自不得不等矣夫乙已丁角既等於乙巳午角則乙己午角必等於乙酉午角譬如已未火酉橫方形己酉為對角斜綫酉已火角本等於己酉未角今乙己丁角既等於乙己午角故乙已午角不能不等於乙酉午角也夫戍己亥角本等於己酉未角即等於乙酉午角今於酉己卬直角內減去乙已午角得午己卯角必等於戍已卯直角內減去戍已亥角所餘之亥己夘角也故己午法綫必平分午己亥角為二也準前解論之撱圓之亥點俯而趨右心戍點亦從之而俯夘點亦從之而左移故撱圓法綫故亦必平分午己亥角也雙綫之亥點升而趨左心戍點亦從之而升夘點亦從之而右移故雙綫亦必平分午巳亥角也如謂前論未確試更作撱圓圖以明之己午與己丁等理詳第三論丁午平分於乙丁乙同乙午午己酉角亦必等於火己酉角因已丁己午兩弦既同丁乙乙午兩句又同故也而火己酉角與戍己亥角為戍酉火金兩斜交綫所成對角是此二角
