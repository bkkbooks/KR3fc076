body:
  text: 論諸曲線式之橫直二徑第五凡二次曲線式平圓撱圓雙曲線皆有二徑惟拋物線不可得徑平圓有相等二徑撱圓雙線皆有大小二徑若撱圓大徑大至無窮兩心差遠至無窮則成拋物線式雙線大徑大至無窮兩心差遠至無窮亦成拋物線式撱圓二徑俱正雙線二徑一正一負雙線為無窮曲線何以亦有大小二徑也解曰雙線者撱圓之反式撱圓與雙線形雖逈異理則相輔相成猶之同一數而異其正負也撱圓二徑在形內雙線二徑在形外撱圓二徑與通徑為連比例三率雙線二徑與通徑亦為連比例三率如圖先知有右木心距頂庚辛通徑乃以右木為首率庚右為中率求得未率為規線規線內減通徑餘為一率右木為二率規線為三率求得四率為右火後另有解內減右木餘為木火以庚辛乘木火開平方得水土此即首未率相乘開方得中率一一識其數按數繪之木火即為大徑水土即為小徑其庚辛水土木火之所以能為連比例三率者何也試作斗牛女井兩切線令俱如水土又作斗女牛井二橫線聯為斗牛女井橫
