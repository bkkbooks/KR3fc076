body:
  text: 笠體雙曲線求截蓋體積術新定大通徑乘矢為初底矢乘之二除之為平錐負正弦畀與初底相減為次底矢乘之三除之為立錐負兩錐相加四除之三乘之為第一數負四分第一數之一二除之三除之為第二數負四分第二數之一九乘之四除之五除之為第三數負四分第三數之一二十五乘之六除之七除之為第四數負順是以下皆如是求至單位下止乃并而四之為笠體雙曲線截蓋體積負
