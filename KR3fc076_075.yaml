body:
  text: 矢正矢正弦因乙出自乘以子土除之為子亥亦為子土而子土本等於乙土則此乙土正弦畀亦丁土大矢土申正矢相乘所得故仍合圓徑弦矢之數推之卯戍金戊圓徑上之弦矢皆然則截面上諸橫線無不與平圓之諸大矢等而前例仍可施故子木火半面仍為拋物面準此知任何圓錐但使截面與斜線平行無不成拋物面即偏頂圓錐上如法截之亦必成拋物面直角圓錐上任一點所直截面必為正交雙曲線面何也如上圖甲乙丙直角圓錐自丁點直截丁金則丁金木面為正交雙曲線面之半案自丁點直截丁金自對面正視其丁巳曲線原應與丁金直線合為一線今欲顯丁金木面故所繪丁巳曲線不能不曲向左以使諸線畢露凡正交雙曲線之例正矢乘大矢得正弦畀與平圓法同而正矢纍長若干大矢亦同長若干見後苐十三論上圖卯人正矢乘人丑大矢為人火正弦畀而卯人本等於正交雙線之正矢丁人人丑本等於正交雙線之大矢準正交雙線例以下圖申戍為徑即如上圖丁子故丁子為正交雙線之徑又例以正矢加徑得正交雙線之大矢今丁人正矢既等于卯人亦必等於離丑故以離丑正矢加人離徑得人丑大矢也二例俱詳第十三論內是即正交雙線例中求
