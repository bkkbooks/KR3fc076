body:
  text: 圓及雙線兩式皆以拋物線為權衡而雙線之有兩心亦猶撱圓之有兩心不過反用其率遂覺形勢不同究之平撱單雙線拋物線一名單曲線亦名單線之四種準線雖形有萬殊而實根於一理依雙線準線論之則正交雙線之準線亦為倍圓徑之周
