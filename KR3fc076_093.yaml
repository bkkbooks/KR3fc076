body:
  text: 圓及雙綫兩式皆以拋物綫為權衡而雙綫之有兩心亦猶撱圓之有兩心不過反用其率遂覺形勢不同究之平撱單雙綫拋物綫一名單曲綫亦名單綫之四種準綫雖形有萬殊而實根於一理依雙綫準綫論之則正交雙綫之準綫亦為倍圓徑之周
