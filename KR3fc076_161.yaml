body:
  text: 小半徑平方乘之一率大半徑平方除之而得四率縱綫平方也雙曲線縱橫綫式解曰雙綫為撱圓反式撱圓例中應減者雙綫倒中應加其理易明按此式兩方相加數即雙綫上正矢乘大矢之數也此四率比例即後論第七條四率比例也拋物綫縱橫綫式第三論中已有解茲不贅以上諸例不獨正徑上縱橫綫為然即兌徑上縱橫綫無不皆然
