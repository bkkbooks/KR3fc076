body:
  text: 小半徑平方乘之一率大半徑平方除之而得四率縱線平方也雙曲線縱橫線式解曰雙線為撱圓反式撱圓例中應減者雙線倒中應加其理易明按此式兩方相加數即雙線上正矢乘大矢之數也此四率比例即後論第七條四率比例也拋物線縱橫線式第三論中已有解茲不贅以上諸例不獨正徑上縱橫線為然即兌徑上縱橫線無不皆然
