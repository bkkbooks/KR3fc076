body:
  text: 圖酉亥或酉金等丑卯午為一假面積未午與上圖申己等下圖為小徑上正交雙線酉亥與酉金等酉亥與井土之比例令如甲丁與申巳之比列火水土為一假面積若以下圖火水土面積為首率上圖戊庚己面積為未率則中圖丑卯午面積必為中率所以然者甲乙丁丙方與戊庚己面之比例本同於酉亥金石方與火水土面之比例亦同於辛壬子癸橫方與丑卯午面之比例俱與不圓撱圓之例相同故此三面積亦必為連比例三率也於撱圓長徑上作一平圓則同橫線平圓之縱線與撱圓之縱線比若長徑與短徑比理祥第四論於雙線長徑上作一正交雙線則同橫線正交雙線之縱解曰正交雙線為雙線之樞猶之平圓為撱圓之樞也故其例亦同論中所設雙線式俱以大徑為橫徑小徑為直徑以便記憶也餘盡同凡撱圓縱線之正方與所分長徑二分之矩形比若短徑之正方與長徑之正方比理詳第四論凡雙線縱線之正方與其交橫軸點距橫徑兩端二線之
