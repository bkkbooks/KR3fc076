body:
  text: 擺線擺線求全曲線術本代微積拾級置母輪徑四乘之即全曲線擺線求截曲線術新定直線為第一數直線乘第一數母輪徑除之一乘之四除之為第二數直線乘第二數母輪徑除之三乘之六除之為第三數直線乘第三數母輪徑除之五乘之八除之為第四數順是以下皆如是求至單位下止乃相并為直線頂距碾初點截曲線擺線以底邊為軸求全殼積術本代微積拾級置母輪面積六十四乘之三除之即全殼積擺線以底邊為軸求截殼積術新定直線自乘以平圓周率乘之為第一數直線乘第一數母輪徑除之一乘之六除之為第二數直線乘第二數母輪徑除之三乘之八除之為第三數直線乘第三數母輪徑除之五乘之十除之為第四數順是以下皆如是求至單位下并之得截殼積擺線求全面積術本代微積拾級置母輪面積三乘之即全面積擺線求半弧矢積術新定
