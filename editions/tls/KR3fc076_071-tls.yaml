body:
  text: 乘大矢必等於正弦平方今卯午為底徑卯井午即底徑上半周丙午為正矢卯丙為大矢丙井為正弦以丙午乘卯丙必為丙井平方此丙并為卯井午半同之正弦又為甲井丙拋物面之縱綫是丙井為公用綫也今丑午既等於卯午則甲丙亦必等於卯丙是此丙午正矢乘卯丙大矢得丙井正弦平方者猶之乎以丙午通徑甲子為通徑丙午等之則丙午亦為通徑乘甲丙橫綫而得丙井縱綫平方也以此推之則以水辰正矢乘戍水大矢得水火正弦平方者以戍辰為圓徑戍火辰為半周故水辰為正矢戍水為大矢水火為正弦亦猶之乎以水辰通徑乘甲水橫綫甲水與戍水等而得水火縱綫平方也以金寅正矢乘申金大矢得金木正弦平方者以申寅為圓徑申木寅為半周故金寅為正矢申金為大矢金本為正弦亦猶之乎以金寅通徑乘甲金橫綫甲金與申金等而得金木縱綫平方也然則以甲井丙面之通徑與縱橫綫攷之無不與拋物綫之算例合而此截面之必為拋物面也又何疑乎截而右為雙曲綫面之理觀後條正交雙曲綫解自明若不用等三邊之圓錐體而用直角圓錐體如前法自任一點截成各面則所截各面之式較之前條式又小變其式亦有平圓撱圓拋物綫雙曲綫所成拋物綫式雖異仍為拋物綫又自任一點直截之必為兩徑相等之雙曲綫
