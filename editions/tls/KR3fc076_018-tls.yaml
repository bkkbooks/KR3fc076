body:
  text: 撱圓求半弧矢積術新定撱正弦與撱正矢相乘為第一數正次置第一數以撱正弦畀乘之撱半徑畀弦與大徑平行則用大半徑畀與小徑平行則用小半徑畀除之二除之三除之為第二數負次置第二數以撱正弦畀乘之撱半徑畀除之一乘之三乘之四除之五除之為第三數負次置第三數以撱正弦畀乘之撱半徑畀除之三乘之五乘之六除之七除之為第四數負順是以下皆如是求至單位下止乃正負並減為撱圓半弧矢積卵體撱圓求全體積術新定小通徑小徑除小徑畀之數乘大半徑為初底大半徑乘之二除之為平錐正小半徑畀與初底相減為次底大半徑乘之三除之為立錐負兩錐相減四除之三乘之為第一數四分第一數之一二除之三除之為第二數四分第二數之一九乘之四除之五除之為第三數四分第三數之一二十五乘之六除之七除之為第四數順是以下皆如是求至單位下止乃并而八之為卵體橢圓全體積榼體撱圓求全體積術新定大通徑小徑除大徑畀之數乘小半徑為初底小半徑乘之二除為平錐正大半徑畀與初底相減為次底小半徑乘之
