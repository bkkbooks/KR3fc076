body:
  text: 名曰正交雙曲綫亦始於一點終於一點解曰試作甲丙丁圓錐體甲角為直角以各種截法截之皆自乙點截起乙巳上截面為平圓乙戊乙庚上截面為撱圓乙壬乙丑上截面為雙曲綫與甲丁平行之乙辛上截面仍為拋物綫惟乙子直綫上所截面為正交雙曲綫與前式異直角圓錐上與斜綫平行截面其橫綫與諸徑上大矢俱不等何以仍為拋物面也如圖丑丙水直角圓錐體截子火與丑水平行子木火為拋物面之半此式子土橫綫小於井土大矢子午橫綫小於女午大矢子火橫綫小於丙火大矢俱不可等前法亦不可施幾疑此式非拋物綫矣試截丁土如子土自子過丁作子金綫則子午與卯午子火與金火皆等又以子土除乙土羃得子亥為通徑即土申午戍火戊皆為通徑自亥點與子火平行作亥戊綫又旨引長亥戊及子金令相遇甲點以金戊為底徑則丙丑水木正圓錐化而為金甲戊木偏圓錐若以丁申為圓徑則丁土土申乙土仍如圖徑上之火
