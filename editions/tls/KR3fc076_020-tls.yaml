body:
  text: 三除之為立錐負兩錐相減四除之三乘之為第一數四分第一數之一二除之三除之為第二數四分弟二數之一九乘之四除之五除之為第三數四分第三數之一二十五乘之六除之七除之為第四數順是以下皆如是求至單位下止乃相并而八之為榼體撱圓全體積凡撱圓體積為等高圓柱積三之二初無俟遞加數求也惟用圓柱則須先求腰圍殊失逕求之義矣故用右二術術異理同卵體撱圓求截葢體積術新定小通徑乘矢為初底矢乘之二除之為平錐正正弦畀與初底相減為次底矢乘之三除之為立錐負兩錐相減四除之三乘之為第一數四分第一數之一二除之三除之為第二數四分第二數之一九乘之四除之五除之為第三數四分第三數之一二十五乘之六除之七除之為第四數順是以下皆如是求至單位下止乃并而四之為卵體撱圓截葢體積榼體撱圓求截葢體積術新定大通徑乘矢為初底矢乘之二除之為平錐正正弦畀與初底相減為次底矢乘之三除之為立錐負兩錐相
