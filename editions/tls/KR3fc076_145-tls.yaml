body:
  text: 必等火己酉角原等於酉己午角則戍己亥角亦必等於酉己午角矣於酉己夘直角內減去一酉己午角於戍已夘直角內減去一戍己亥角則所餘之午己夘亥己夘兩角必為相等故撱圓法綫亦平分午己亥角也試更作雙綫圖以明之己午與己丁等理詳第三論丁午平分於乙丁乙同乙午午已酉角亦必等於火己酉角如理前解而火己酉角與戍己亥角為戍酉火亥兩斜交綫所成對角是此二角必等火己酉角原等於酉己午角則戍己亥角亦必等於酉己午角矣於酉己夘直角內減去一酉己午角於戍已夘直角內減去一戍己亥角則所餘之午己夘亥己夘兩角必為相等故雙線法綫亦平分午己亥角也凡諸曲綫式之切綫亦平分切點距二心綫之交角即前圖切綫平分火己午角也凡切點縱綫及切綫二交軸點之距綫為次切綫拋物線之次切綫必平分於頂點解曰準拋物綫法綫圖乙己午角既等於乙酉午角則己午與午酉亦不能不等已午原等於不丑則未丑與
