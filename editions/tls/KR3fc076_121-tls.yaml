body:
  text: 房虛危諸綫平分於室於栁皆為午未兌徑所平分也雙綫兌徑解曰如圖昴星尾雙綫土婁為大正徑壁水為小正徑任於星點之上作過心綫星火為大兌徑又任作胃觜綫與星火平行平分於參過參及心作一綫則木奎為小兌徑與木奎平行之萁鬼翌氐諸綫平分於畢於軫皆為引長星火兌經所平分也拋物綫兌徑解曰如圖甲乙丙拋物綫乙已為大正徑一叚任於卯點上作卯午橫綫中心遠甚不能過故為橫綫與乙己平行為大兌徑一叚又作卯點切綫戊庚與戊庚平行之辛壬未癸諸綫平分於子於丑皆為卯午一叚兌徑所平分也撱圓任何二兌徑二平方之和恒等於二正徑二平方之和雙曲綫任何二兌徑二平方之較恒等於二正徑二平方之較撱圓二兌徑畀和恒等於二正徑畀和其理須作四次解之第一解曰凡撱圓任作大小二兌徑
