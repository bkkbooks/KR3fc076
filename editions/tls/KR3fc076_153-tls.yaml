body:
  text: 數乘另數所得為半本數之畀必本數四倍於另數而後可猶之以四乘一而得二之畀也然則拋物綫任何斜通徑但使斜通徑穿過針心必為所易心距頂之四倍矣次解雙綫如圖子丑為大兌徑寅夘為小兌徑以子丑為首率寅夘為中率求得丙子為未率即為斜通徑其子午己午未午必為連比例三率即申子戍申酉申亦為連比例三率比與正通徑之比例均同葢雙綫為撱圓反式故撱圓諸斜規綫頂上一綫起於大兌徑右端雙綫諸斜規綫頂上一綫起於大兌徑左端無不兩兩相反也
  hash: sha256:3f5c75c569a71eb47d2020a824596cb07e06df1fb31a2060b8466261f1201c36
