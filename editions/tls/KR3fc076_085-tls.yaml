body:
  text: 作線至左心復自左心過甲點直抵準線上辛點此甲左必與甲辛等又於撱周丙點上作線至左心復自右心過丙點直抵準綫上庚點此丙左心與丙庚等以此例推之上下四周無不皆然其所以能相等者因右木半徑等於金火撱大徑即右辛右庚等半徑無不等於撱大徑而撱周上任一點距二心之和又必等於撱大徑是撱圓內甲右加甲左亦等於右辛若各去一甲右則甲左不得不等於甲辛矣撱圓內丙右加丙左亦等於右庚若各去一丙右則丙左不得不等於丙庚矣餘類推故倍大徑之平圓周為撱圓准綫也拋物綫之準綫何以為一直綫也解曰如圖斗亢牛拋物綫心在井今取亢昴如井亢於昴點上作張昴軫直綫即為準綫可取前圖撱圓以明之前圖戊左等戊壬丙左等丙庚則此圖虛井亦心等虛壁危井亦民必等危奎室亦必等室胃餘皆然其所以然者因前圖辛右庚右諸半徑皆集於右心今此圖拋物綫既為撱圓之極式則只有左心即井點其右心遠在不可窮極之外則室胃危奎虛壁諸綫勢不能到右心右心既不能到則此諸綫不能為半徑而不
