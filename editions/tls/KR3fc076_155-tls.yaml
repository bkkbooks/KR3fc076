body:
  text: 論諸曲綫之縱橫綫式第十諸曲綫所以能成式者以縱線與橫綫有此例之理也若以中點為原點曲綫任一點抵橫軸為縱綫中點抵縱綫底點為橫綫則平圓以縱綫平方與橫綫平方相加等於半徑平方正交雙曲綫以縱綫平方與橫綫平方相減等於半徑平方撱圓以縱綫平方乘大半徑平方得數橫綫平方乘小半徑平方得數兩數相加等於大半徑平方乘小半徑平方雙曲綫以縱綫平方乘大半徑平方得數橫綫平方乘小半徑平方得數兩數相減等於大半徑平方乘小半徑平方惟拋物綫無其式平圓縱橫綫式解曰平圓縱綫為正弦橫綫為餘弦以正弦畀加餘弦畀必得半徑畀即句股求弦也正交雙曲綫縱橫綫式解曰此式為平圓反式其橫直二徑為一正一負縱綫與直徑為類橫線與橫徑為類故縱橫綫亦一正一負即縱橫綫之畀亦一正一負兩畀之正負異故以減為加而得半徑畀也撱圓縱橫綫式解曰如圖甲中為大半徑乙中為小半徑己為曲綫上任一點己未為縱綫未中為橫綫以己未乘甲中加未中乘乙中必等於甲中乘乙中其故何也試切撱圓作一大徑上平圓引長己未至平圓周上
