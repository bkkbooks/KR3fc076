body:
  text: 若雙曲綫之規線則長短不齊右長左短與撱圓規綫之左長右短者正相反故雙曲綫者撱圓之反式也解曰如圖水木火雙綫式未為右心乙土為通徑辛為左心木為右頂點庚為左頂點若於木點上作亥木直綫令與乙土等又自庚點向亥作庚亢無界斜綫則未木橫綫乙未直綫戍未規綫必為連比例三率餘如午木丁午酉午等無不為連比例三率所以然者因雙綫本為撱圓之反式撱圓準綫上諸綫皆趨右心則雙綫準綫上諸綫自皆趨左心撱圓規綫頂上一綫趨右頂點雙綫規綫頂上一綫亦就趨左頂點矣凡諸曲綫式諸規綫頂上綫與曲綫相交於一點此一點上之橫直綫為相等左之則直大於橫右之則橫大於直解曰如後第一圖平圓交點在甲則甲乙與乙丙等第二圖撱圓交點在天則天地與地人等如第三圖拋物綫交點在子則子丑與丑寅等如第四圖雙曲綫交點在金則金木與木水等葢未率規綫既等於中率直綫則中率直綫自不得不等於首率橫綫也
