body:
  text: 矩形比若短徑之正方與橫徑之正方比解曰撱圓所用長徑二分為首縱綫交橫軸點距二頂點之二綫即正矢大矢二綫比雙綫所用二綫亦正矢大矢二綫惟兩頂點相對故二綫相疊耳其綫所則來之故同故其例亦同撱圓本兌徑與相屬兌徑之二正方比若縱綫所分本徑二分之矩形與縱綫之正方比解曰如圖丁甲為本兌徑乙戊為相屬兌徑以丁甲平方比乙戊平方若丁卒乘辛甲方與辛庚平方其故何也準第九論撱圓二兌徑及斜縱橫綫俱可按其數易作大小二正徑式大兌徑用為大正徑小兌徑用為小正徑斜縱橫綫用為正縱橫綫既與算法無乘則此條之例亦可準本論第六條之例矣雙綫本兌徑與相屬兌徑之二正方比若縱綫交橫軸點距本徑二界之矩形與縱綫之正方比解曰如圖丁己為本兌徑戊甲為相屬兌徑以丁己平方比戊甲平方若辛丁乘卒已方與乙辛平方準二次曲綫理撱圓二兌徑式可易為二正徑式雙綫二兌徑式亦必可易為二正徑式大兌徑用為大正徑小兌徑
