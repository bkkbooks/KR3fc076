body:
  text: 方形又自中心乙向橫方四角各作斜引綫長之作子丑寅卯二斜線此二綫名漸近綫如乙子為木亥曲線之界木亥漸引而長乙子亦漸引而長木亥曲綫愈長愈與乙子綫相近而終不能到乙子綫上又上下補作兩雙綫形則辰水午與戍土房俱不能到漸近綫上未火申亦然設上下左右四曲綫俱大至無量數則弧端八點如亥酉未申辰午戍房八點幾欲與漸近綫遇而辰酉戍午未申房每二點幾欲合成一點是八點漸變爲四點也此四點上作二橫綫二直綫聯成橫方形為無量大橫方形其橫直綫亦為無量大橫直綫此無量大橫綫即雙綫式大徑無量大直綫即雙綫式小徑準二次曲綫例通徑必為大小二徑之中率今無量大橫直綫之數雖不可知而無量大橫綫與無量大直綫之比例必等於木火與水土之比例則可知也比例既等則通徑可為無量大二徑之中率亦可為木火水土之中率矣故木火為雙曲綫大徑水土為雙曲綫小徑葢舍其不可知之大小二徑而還用其可知之大小二徑也若按此大小二徑作一撱圓求得撱圓通徑必與雙綫上通徑等依此論之撱圓有兩徑雙綫亦有兩徑撱圓有兩心雙綫亦有兩心撱圓雨頂點即撱大徑左右端二點相背雙綫兩頂點相對撱圓兩徑在面積內雙綫兩徑在面積外撱圓
