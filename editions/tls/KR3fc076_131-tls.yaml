body:
  text: 丁辰二正方之總甲辛小兌徑為甲午午辛二正方之總是此大小二兌徑二正方之和為甲辰丁辰甲午午辛四正方之總也而丁辰正方等於夘午正方午辛正方等於丑辰正方是半兌徑上四正方總同於半正徑上四正方總也而大小半兌徑之二正方和自等於大小半正徑之二正方和矣即大小全兌徑之二正方和亦等於大小全正徑之二正方和矣子寅甲寅長方等於丙寅乙寅長方因為四率比例何也如圖撱圓外切一平圓引長寅丁至平圓周上土點於土點作一切綫與引長兩徑遇於子於木寅土為平圓上正弦準第三論第一解乙寅正矢乘丙寅大矢等於寅土正弦畀又子甲為正割綫甲寅為餘弦土火等子寅為正割餘弦較甲土子形為直角形寅土為垂綫以甲寅比寅土若寅土與子寅故子寅乘甲寅亦為寅土正弦畀故子寅乘甲寅必等於乙寅乘丙寅即一四率相乘等於二三率相乘也準前支解丙寅乘乙寅既等於寅土畀則以丙寅乘乙
