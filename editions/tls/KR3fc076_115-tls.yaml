body:
  text: 兩心距小於大徑雙綫兩心距大於大徑而其較俱為心距頂之倍一正減一反減所謂異其正負也撱圓規綫上橫綫自左趨右頂雙綫規綫上橫綫自右趨左頂撱圓兩帶徑和恒等雙綫兩帶徑較恒等無不兩兩相反信乎雙綫為撱圓之反式也通徑減規綫為一率右木為二率規綫為三紡右火為四率此四率何以能為比例也解曰如圖甲乙丙雙綫式準第四論令庚乙等於癸子通徑自辛過庚作辛丑無界綫則丁乙癸丁戊丁必為連比例三率戊丁為規綫以等通徑之庚乙減之餘為戊已已庚等於丁乙則以戊已比已庚必若戊丁與丁辛矣撱圓與雙綫兩心距遠至無窮俱成拋物綫者何也解曰先以雙綫論之如前圖自左心壬向右式作壬寅壬辰諸綫在式內者為寅夘辰午諸綫設丁壬距遠至無
