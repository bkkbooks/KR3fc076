body:
  text: 丁點成丁未綫為平圓正弦則撱大徑等丁中為弦丁未為股橫綫未中為句若此句股弦三事各以乙中乘之則乙中乘未中為句乙中乘丁未為股乙中乘丁中為弦句股弦之比例仍同今題中大半徑畀乘小半徑畀原為大徑乘小徑又自乘之數即乙中乘丁中甲中等為弦之弦畀也題中橫綫平方乘小半徑平方原為橫綫乘小半徑又自乘之數即乙中乘未中為句之句畀也題中縱綫平方乘大半徑平方原為縱綫乘大半徑又自乘之數即己未乘甲中又自乘之數而己未乘甲中本同於丁未乘乙中準第四論以乙中此甲中若己未與丁未故二三率相乘數與一四率相乘數等也是即乙中乘丁未為股之股畀也故橫綫平方乘小半徑平方為句畀縱綫平方乘大半徑平方為股畀大半徑平方乘小半徑平方為弦畀句畀加股畀必與弦畀等故撱圓有此縱橫綫式也雙曲綫縱橫綫式解曰雙綫為撱圓反式撱圓例中應加者雙綫例中應減其理易明按此式較之撱圓式乃易股為弦也撱圓式以勾畀股畀相加得弦畀此式以勾畀弦畀相減得股畀拋物線無中心可言故無此種橫線即無其式
