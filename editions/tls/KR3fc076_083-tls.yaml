body:
  text: 論諸曲綫式皆有準綫第三凡曲式之準綫皆在曲綫式之外平圓準綫為倍徑之周仍以圓心為心撱圓準綫為倍大徑之平圓周以任一心為心拋物綫準綫為一直綫凡曲綫上任一點抵心與抵準綫之二綫必相等平圓準綫何以為倍徑之周而仍以圓心為心也解曰先作子辰土寅平圓復取寅卯如寅心以心為心卯為界作外圓周此外圓周即為準綫於內圓周子點上作線至心又自子點作綫至丑子心必與子丑等餘可類推故倍徑圓周為本平圓準綫也撱圓準綫何以為倍大徑之平圓周而以任一心為心也解曰如圖甲金水火撱圓二偏心在左右今取火木如左火以右心為心木為界作一平圓於外此平圓即為準綫於撱周甲點上
  hash: sha256:76a30ab0a9cb66eb9b1420b4051fe01d5b2c569cae823962de80c009dd17c44d
