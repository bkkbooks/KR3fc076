body:
  text: 螺綫即亞奇德螺綫求任幾匝螺綫術新定置匝未帶徑以初設帶徑除之為用徑另以倍平圓周率之自乘數除單一為常數用徑畀加常數平方開之用徑乘之平圓周率乘之於上又以用徑畀加常數平方開之與用徑相加以常數之平方根除之得數乃求此數之訥氏對數以常數乘之平圓周率乘之以加上位又以初設帶徑乘之得所求任幾匝螺綫求任幾匝螺綫面積術本代微積拾級先求借徑匝數為幾者以幾之立方為第一數正幾內減一之立方為第二數負幾內減二之立方為第三數正幾內減三之立方為第四數負謂幾內減幾得數乃求其立方也如是累求至得數為單一而止乃正負并減三而一為借徑按右術若所求為千百匝面積則不勝其繁矣今別立㨗法以求借徑術如下凡匝數為奇數者以匝數減一折半為初底初底減匝數為次底初底加一乘初底半之於上又次底加一乘次底半之以加上位為正數另置匝數減一半之為借匝數借匝數加一乘借匝數為負數正數內減負
  hash: sha256:da6cf05df1dee2bd1a75989088049c01c717efb2a91031409659628fc8fa2ca2
