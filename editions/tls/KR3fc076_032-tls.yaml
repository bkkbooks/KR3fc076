body:
  text: 數以本正弦畀乘之本半徑畀除之一乘之五乘之二除之七除之為第二數正次置第二數以本正弦畀乘之本半徑畀除之三乘之七乘之四除之九除之為第三數負次置第三數以本正弦畀乘之本半徑畀除之五乘之九乘之六除之十一除之為第四數正順是以下皆如是求至單位下止乃正負并減為總第三數置半心差五乘方以本正弦六乘方乘之本半徑十一乘方除之二而一又四而一又六而一七除之為第一數負次置第一數以本正弦畀乘之本半徑畀除之一乘之七乘之二除之九除之為第二數負次置第二數以本正弦畀乘之本半徑畀除之三乘之九乘之四除之十一除之為第三數正次置第三數以本正弦畀乘之本半徑畀除之五乘之十一乘之六除之十三除之爲第四數負順是以下皆如是求至單位下止乃正負并減為總第四數如是疊次求之求得總數降至單位下止乃以諸總數正負並減為雙曲綫弧背負若本正弦大於本半徑則此術不能求若等邊雙曲綫即以總第一數為弧背負笠體雙曲綫以小徑為軸求截葢殼積術未定鍾體雙曲綫以大徑為軸求截葢殼積術未定
