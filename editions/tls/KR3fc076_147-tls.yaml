body:
  text: 午酉亦必等夫午甲與甲丑本相等則於未丑內去甲丑得未甲於午酉內去午甲得甲酉此二綫亦必等惟未甲與甲酉等故未酉次切綫恒平分於頂點甲凡切點上縱線底與法綫底之距為次法綫拋物綫之次法綫恒等於半通徑解曰準拋物綫法綫圖午丁與己夘平行己西既與己午等則已午懷夘午亦不能不等即夘午與未丑亦不能不等夫午丑本等於半通徑則夘午與未丑內各去一未午所餘之夘未必與午丑等即夘未與半通徑等五曲綫求四直綫術凡平圓正雙綫以餘弦除正弦畀為次切餘弦為次法正弦為股次切為勾勾股求弦得切綫正弦為股次法為勾勾股求弦得法綫凡撱圓斜雙綫以正弦畀乘大半徑畀為實餘弦乘小半徑畀為法除之得次切又以餘弦乘小半徑畀為實大半徑畀為法除之得次法如前得切綫法綫凡拋物綫以倍矢為次切半通徑為次法如前得切綫法綫以上俱以大徑為橫小徑為直餘弦為橫正弦為直
