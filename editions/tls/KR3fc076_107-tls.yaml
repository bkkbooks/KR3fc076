body:
  text: 凡心距頂點與通徑之比例平圓若一與二撱圓若一與贏於二朒於四拋物綫若一與四二乘拋物綫若一與八三乘拋物綫若一與十六每增一乘則通徑增一倍雙曲綫若一與贏於四至無窮數解曰如前第一圖心距頂乙丙通徑甲戊若一與二第二圖心距頂物人通徑角亢若一與贏於二朒於四第三圖心距頂卯寅通徑午未若一與四第四圖心距頂火水通徑土申若一與贏於四至無窮數內平圓拋物綫二種為有定式故比例亦有定數撱圓雙綫二種為無定式故比例亦無定數準第一論圓錐上所截面有無量式自右漸截至左其通徑率亦以次遞長也至於一乘拋物綫為平方故通徑率亦為二之平方二乘拋物綫為立方故通徑徑率亦為二之立方其理尤為一貫
  hash: sha256:cb8c49144ad2f7984defb4ff8df64ee5cdf5c09ca49a1c8c4073df4829b29075
