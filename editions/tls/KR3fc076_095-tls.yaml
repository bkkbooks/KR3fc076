body:
  text: 論諸曲綫式皆有規綫第四凡諸曲綫式之橫直綫皆以規線為權衡平圓撱圓之規綫長短不齊而有定限各種拋物綫之規綫只有一數凡起首規線曰通徑平圓撱圓拋物線雙曲綫四式俱以規綫乘橫綫為直綫自乘方二乘拋物綫式以規線自乘方乘橫綫為直綫再乘方三乘拋物綫式以規線再乘方乘橫綫為直綫三乘方以後拋物綫之乘數遞增則乘法與直綫之數乘方亦遞增之各種拋物綫之規綫皆與通徑等平圓規綫解曰如圖甲乙丙丁平圓甲丙乙丁為十字圓徑丑為圓心試以甲丙為首率乙丁為中率求得未率戊丁為通徑即為最大規線此戊丁必等於圓徑乃自乙至戊作乙戊斜綫則庚寅辛卯等皆為遞短之規綫用法以首率寅丁矢乘未率庚寅規線開平方得中率已寅正弦又以首率卯丁矢乘未庇辛卯規線開平方得中率午卯正弦餘可類推
