body:
  text: 一以正法綫平方加正切綫平方開平方得正割綫以正法綫當半徑一以餘法綫平方加餘切綫平方開平方得餘割綫以餘法綫當半徑一以正切綫比正法綫若餘法綫與餘切綫以正餘二法綫當半徑一以餘弦比正弦若正法綫與正切綫以正法綫當半徑一以正弦比餘弦者餘法綫與餘切綫當餘法綫當半徑一以正弦平方與餘弦平方相減開平方得半徑與平圓加減異號一正矢與大矢之較無不等於徑與平圓加減異號地圖易和為較一正矢加全徑為大矢與平圓加減異號一餘矢加半徑為正弦與平圓加減異號一餘矢餘大矢相乘開平方得餘弦與平圓同一以正法綫比正弦若正割與正切以正法綫當半徑一以餘法綫比餘弦若餘割與餘切以餘法綫當半徑
