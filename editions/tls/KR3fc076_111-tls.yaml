body:
  text: 論諸曲綫式之橫直二徑第五凡二次曲綫式平圓撱圓雙曲綫皆有二徑惟拋物綫不可得徑平圓有相等二徑撱圓雙綫皆有大小二徑若撱圓大徑大至無窮兩心差遠至無窮則成拋物綫式雙綫大徑大至無窮兩心差遠至無窮亦成拋物綫式撱圓二徑俱正雙綫二徑一正一負雙綫為無窮曲綫何以亦有大小二徑也解曰雙綫者撱圓之反式撱圓與雙線形雖逈異理則相輔相成猶之同一數而異其正負也撱圓二徑在形內雙綫二徑在形外撱圓二徑與通徑為連比例三率雙綫二徑與通徑亦為連比例三率如圖先知有右木心距頂庚辛通徑乃以右木為首率庚右為中率求得未率為規線規綫內減通徑餘為一率右木為二率規綫為三率求得四率為右火後另有解內減右木餘為木火以庚辛乘木火開平方得水土此即首未率相乘開方得中率一一識其數按數繪之木火即為大徑水土即為小徑其庚辛水土木火之所以能為連比例三率者何也試作斗牛女井兩切綫令俱如水土又作斗女牛井二橫綫聯為斗牛女井橫
