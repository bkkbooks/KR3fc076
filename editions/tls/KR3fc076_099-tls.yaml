body:
  text: 甲壬半未率得甲子此三線亦必為連比例而甲乙乘甲子必等於甲壬畀矣夫以四率比例論之丁辛畀為一率乙丁乘丁丙為二率甲壬畀為三率乙甲乘甲丙為四率後另有解此四率比例既同而以丁丙比丁丑本若甲丙與甲子則易以乙丁乘丁丙為一率乙丁乘丁丑為二率乙甲乘甲丙為三率乙甲乘甲子為四率比四率比例亦必相同比四率內第一率以丁辛畀代之第三率以甲壬畀代之其式成丁辛畀為一率乙丁乘丁丑為二率甲壬畀為三率乙甲乘甲子為四率比四率比例亦必相同矣今第四率乙甲乘甲子既等於三率甲壬畀則第二率乙丁乘丁丑自不得不等於一率丁畀矣然則丁辛畀為一率乙丁乘丁丙為二率甲壬畀為三率乙甲乘甲丙為四率比四率何以能為比例也解答如圖壬丙寅乙撱圓以大徑為平圓徑於撱圓外作一平圓任於土點作土丁正弦與艮坎圓徑平行準本論第一解乙丁乘丁丙必等於丁土畀則乙甲乘
  hash: sha256:c70d4662ea7691e82a363123ff8db74410b0c3028aad255dc41fc5694d565db9
