body:
  text: 論諸曲綫式之心第二凡點為一心綫為二心平圓象點故一心撱圓象綫故二心各種拋物綫象無窮長綫故但得一心而不能得又一心雙曲綫之本面亦衹一心并對面一心為二心解曰平圓者一點之拓而大者也故其心仍在中平圓既與點同類則引長平圓為撱圓必與線同類線以兩端為兩心故撱圓亦有兩心惟點之位置恒在兩棱相輳尖鋒之處線之兩端為尖鋒故點在兩端撱圓兩端無尖鋒故兩心在圓內而不能在大徑兩端也至如各種拋物綫其長無竟亦如無竟長之線衹有一端而不得其又一端故亦衹有一心也若拋物綫乘數多至無量必至變成一綫而其心為綫端一點撱圓之有兩心猶人以兩目注視遠物其近物心岐而為二物二物仍一物也撱圓弧上任一點距兩心之和必如大徑此兩綫仍為一綫猶之乎岐視之二物仍為一物也然則撱圓之兩心亦猶平圓之一心矣
