body:
  text: 數數三除之為借徑凡匝數為偶數者以匝數減一為副匝數又減一折半為初底初底減副匝數為次底初底加一乘初底半之於上又次底加一乘次底半之以加上位為負數另置匝數半之為借匝數借匝數加一乘借匝數為正數正數內減負數三除之為借徑置借經三乘之為第一數四分第一數之一二除之三除之為第二數四分第二數之一九乘之四除之五除之為第三數四分第三數之一二十五乘之六除之七除之為第四數順是以下皆如是求至單位下止乃相并為所求任幾匝面積
