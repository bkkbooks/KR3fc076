body:
  text: 若以大徑一端為原點縱綫如前另易縱綫底點距大徑一端為橫綫則撱圓以大徑乘橫綫與橫綫平方相減又小半徑平方乘之大半徑平方除之等於縱綫平方雙綫以大徑乘橫綫與橫綫平方相加又小半徑平方乘之大半徑平方除之等於縱綫平方拋物綫以通徑乘橫線等於縱綫平方撱圓縱橫綫式解曰如圖壬丙癸甲撱圓甲為原點己為曲綫上任一點己未為縱綫未甲為橫綫作庚甲如未甲辛丙庚甲方為大徑乘橫綫數戊未庚甲為橫綫平方以橫綫平方減辛丙庚甲方餘為辛丙戊未方以大半徑平方比小半徑平方若辛丙戊未方與己未縱綫平方其故何也試切撱圓作大徑上平圓引長己未至平圓周上丁點則丁未為平圓正弦準第四輪以大半徑平方比小半徑平方若丁未平方與己未平方又準第三論丙未乘未甲等於丁未平方今戊未與未甲等則丙未乘戊未亦等於丁未平方矣丙戊乘戊未為辛丙戊未方以此方代前四率比例之第三率則以大關徑平方比小半徑平方亦若辛丙戊未方與己未平方矣故辛丙戊未方為三率以二率
