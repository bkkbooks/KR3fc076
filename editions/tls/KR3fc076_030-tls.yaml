body:
  text: 雙曲綫雙曲綫正弦求弧背術新定本正弦為第一數負次置第一數以本正弦畀乘之本半徑畀除之視本形以大徑為軸則用大半徑畀若以小徑為軸則用小半徑一乘之又一乘之二除之三除之為第三負數次置第二數以本正弦畀乘之本半徑畀除之三乘之又三乘之四除之五除之為第三數正次置第三數以本正弦畀乘之本半徑畀除之五乘之又五乘之六除之七除之為第四數負順是以下皆如是求至單位下止乃正負并減為總第一數或大徑為軸或小徑為軸其總數之級數一為負負正負正負一為負正正正正置半心差雙曲綫之半心差有二俱以軸上半心差入其自乘方以本正弦立方乘之本半徑三乘方除之二而一三除之為第一數負次置第一數以本正弦畀乘之本半徑畀除之一乘之三乘之二除之五除也為第二數負次置第二數以本正弦畀乘之本半徑畀除之三乘之五乘之四除之七除之為第三數正次置第三數以本正弦畀乘之本半徑畀除之五乘之七乘之六除之九除之為第四數負順是以下皆如是求至單位下止乃正負并減為總第二數置半心差三乘方以本正弦四乘方乘之本半徑七乘方除之二而一又四而一五除之為第一數正次置第一
