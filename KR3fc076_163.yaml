body:
  text: 論諸曲線式互為比例第十一凡無數撱圓可以平圓為比例無數雙曲線可以正交雙曲線為比例拋物線式可以兩心差極大之撱圓為比例亦可以兩心差極大之雙曲線為比例義俱見前以小徑平圓為連比例首率大徑平圓為未率則兼此大小徑之撱圓為中率解曰試任設大小兩數以小數自乘為首率大數自乘為未率其中率必為大小兩數相乘之數故小徑平方為首率大徑平方為未率其中率必為大小徑相乘之長方也夫平圓與撱圓之比例本同於正方與長方之比例則小徑平圓兼大小徑撱圓大徑平圓亦必為連比例三率矣以小徑上正交雙線面為連比例首率大徑上正交雙線面為未率則兼此大小徑之雙線面為中率解曰如上圖為大徑上正交雙線甲乙與甲丁等戊庚已為一假面積中圖為兼大小徑雙線辛子為大徑與上圖甲乙或甲丁等辛壬為小徑與下
  hash: sha256:9d8043980b9ec8934acd74ef1aed76c39a01c97d253783faba46dd399af4f0a5
