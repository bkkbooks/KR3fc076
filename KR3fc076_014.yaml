body:
  text: 榼體撱圓高為小徑腰圍炎大徑平圓求全殻積術新定大小二半徑相乘平圓周率乘之四之為第一數正次置第一數以半心差畀乘之小半徑畀除之二除之三除之為第二數正次置第二數以半心差畀乘之小半徑畀除之一乘之三乘之四除之五除之為第三數負次置第三數以半心差畀乘之小半徑畀除之三乘之五乘之六除之七除之為第四數正順是以下皆如是求至單位下止乃正負并減為榼體撱圓之全殻積卵體撱圓求截葢殻積術新定撱餘弦即半大徑內去葢高之餘乘小半徑平圓周率乘之倍之為第一數正次置第一數以半心差畀乘之撱餘弦畀乘之大半徑三乘方除之二除之三除之為第二數負次置第二數以半心差畀乘之撱餘弦畀乘之大半徑三乘方除之一乘之三乘之四除之五除之為第三數負次置第三數以半心差畀乘之撱餘弦畀乘之大半徑三乘方除之三乘之五乘之六除之七除之為第四數負順也以下皆如是求至單位下止乃正負並減為餘弦上圍殻積以減半全殻積為卯體撱圓之截葢殻積榼體撱圓求截葢殻積術新定撱餘弦即半小徑內去葢高之餘乘大半徑平圓周率乘之倍之為第
