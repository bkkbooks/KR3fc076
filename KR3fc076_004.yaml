body:
  text: 致曲術平圓楕圓拋物綫曲綫擺綫對數曲綫螺綫正弦畀為第一數正弦畀乘第一數半徑畀除之四乘之三除之四除之為第二數下弦畀乘第二數半徑畀除之十六乘之五除之六除之為第三數正弦畀乘第三數半徑畀除之三十六乘之七除之八除之為第四數順是以下皆如是求至單位下止乃相并為弧背之自乘數平方開之得弧背正矢求孤背術一新定正矢之平方根乘半徑之平方根以二之平方根乘之為第一數正矢乘第一數全徑除之一乘之二除之三除之為第二數正矢乘第二數全徑除之九乘之四除之
