body:
  text: 窮則寅夘辰午必至與申乙軸平行而如拋綫之例矣又以撱圓論之如後圖自右心向左作右子右丑諸綫在左半圓內者為甲子乙丑諸綫設右左距遠至無窮則甲子乙丑必至與午未軸平行而如拋物綫之例矣總而論之猶之第一論圓錐上所截諸面拋物綫而只一式截而左為撱圓面截而右為雙綫面撱圓面雙綫面之兩心距愈遠則截面愈近於拋物綫遠至無窮而截面必與拋物綫面合一矣雙綫二徑必一正一負者何也解曰雙綫式既為撱圓之反式則撱圓為正式雙綫為負式猶之一以上對數為正對數一以下對數為負對數也雙綫式為負者則於雙綫通徑為負而雙綫通徑與二徑為連比例三率設中率小徑為正以未率負通徑除之必得首率負大徑葢異名相除則為負也設中率小徑為負以未率負通徑除之必得首率正大徑葢同名相除仍為正也故雙綫二徑必一正一負若正交雙綫式則橫直二徑同數與平圓徑同
