body:
  text: 成拋物綫則大小徑之長無竟有軸左端癸點而無軸右端無軸右端者軸右端遠極而不可測也而辛亥乃不能到軸右端而必與軸為平行矣圖中丑卯為通徑等於辛癸丑卯上辰點為針心辛亥與軸平行其比例同於撱圓以癸辰為首率戊辰為未率首未率相乘開平方得中率丑辰此理正與撱圓同惟辛亥與軸平行故任何點之連比例三率其未率皆等於辛癸即皆等於通徑丑卯二乘拋物線規綫解曰準一乘拋物綫論之只有一心不可得又一心諸乘拋物綫皆然故二乘拋物曲綫上任何點距準綫其距綫亦皆與橫軸平行凡式以橫為首率直綫為中率求得未率為規綫今拋物綫式既增一乘即三率亦各宜增一乘而此二乘拋物綫之橫線與直綫立方為比例是比式橫綫已增一乘矣乃以為首率直綫為中率中率自之再之此所謂增一乘以首率除之得數開平方為規綫首率除得之未率亦增一乘故為規綫畀而二乘拋物綫之規綫無不與通徑等如一乘拋物線式故以通徑畀乘任何橫綫必等於直綫之再乘方也三乘以上之連比例三率各按乘數遞增一乘理本同源無煩贅説
