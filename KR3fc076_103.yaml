body:
  text: 成拋物線則大小徑之長無竟有軸左端癸點而無軸右端無軸右端者軸右端遠極而不可測也而辛亥乃不能到軸右端而必與軸為平行矣圖中丑卯為通徑等於辛癸丑卯上辰點為針心辛亥與軸平行其比例同於撱圓以癸辰為首率戊辰為未率首未率相乘開平方得中率丑辰此理正與撱圓同惟辛亥與軸平行故任何點之連比例三率其未率皆等於辛癸即皆等於通徑丑卯二乘拋物線規線解曰準一乘拋物線論之只有一心不可得又一心諸乘拋物線皆然故二乘拋物曲線上任何點距準線其距線亦皆與橫軸平行凡式以橫為首率直線為中率求得未率為規線今拋物線式既增一乘即三率亦各宜增一乘而此二乘拋物線之橫線與直線立方為比例是比式橫線已增一乘矣乃以為首率直線為中率中率自之再之此所謂增一乘以首率除之得數開平方為規線首率除得之未率亦增一乘故為規線畀而二乘拋物線之規線無不與通徑等如一乘拋物線式故以通徑畀乘任何橫線必等於直線之再乘方也三乘以上之連比例三率各按乘數遞增一乘理本同源無煩贅説
