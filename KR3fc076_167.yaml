body:
  text: 矩形比若短徑之正方與橫徑之正方比解曰撱圓所用長徑二分為首縱線交橫軸點距二頂點之二線即正矢大矢二線比雙線所用二線亦正矢大矢二線惟兩頂點相對故二線相疊耳其線所則來之故同故其例亦同撱圓本兌徑與相屬兌徑之二正方比若縱線所分本徑二分之矩形與縱線之正方比解曰如圖丁甲為本兌徑乙戊為相屬兌徑以丁甲平方比乙戊平方若丁卒乘辛甲方與辛庚平方其故何也準第九論撱圓二兌徑及斜縱橫線俱可按其數易作大小二正徑式大兌徑用為大正徑小兌徑用為小正徑斜縱橫線用為正縱橫線既與算法無乘則此條之例亦可準本論第六條之例矣雙線本兌徑與相屬兌徑之二正方比若縱線交橫軸點距本徑二界之矩形與縱線之正方比解曰如圖丁己為本兌徑戊甲為相屬兌徑以丁己平方比戊甲平方若辛丁乘卒已方與乙辛平方準二次曲線理撱圓二兌徑式可易為二正徑式雙線二兌徑式亦必可易為二正徑式大兌徑用為大正徑小兌徑
