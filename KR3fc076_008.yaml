body:
  text: 撱圓撱圓求全周術一本錢塘項氏以大徑為平圓徑求得平圓周為第一數正次置第一數以半心差畀乘之大半徑畀除之四除之為第二數負次置第二數以半心差畀乘之大半徑畀除之一乘之三乘之十六除之為第三數負次置第三數以半心差畀乘之大半徑畀除之三乘之五乘之三十六除之為第四數負順是以下皆如是求至單位下止乃正負并減為撱圓全周撱圓全周術二本錢塘戴氏以小徑為平圓徑求得平圓周為第一數正次置第一數以半心差畀乘之小半徑畀除之四除之為第二數正次置第二數以半心差畀乘之小半徑畀除之一乘之三乘之十六除之為第三數負次置第三數以半心差畀乘之小半徑畀除之三乘之五乘之三十六除之為第四數正順是以下皆如是求至單位下止乃正負并減為撱圓全周撱正弦求撱弧背術新定撱正弦為第一數次置第一數以撱正弦畀乘之撱半徑畀除之視撱正弦與大半徑平行則用大半徑畀若與小半徑平行時用小半徑畀一乘之
