body:
  text: 致曲圖解總論天為大圓天之賦物莫不以圓顧圓雖一名類乃萬族循圓一匝而曲線生焉西人以線所由生之次數分為諸類一次式惟直線二次式有平圓撱圓拋物線雙曲線四式三次式有八十種四次式有五千餘種五次以上蓋不可考矣今但就二次式四種溯其本源并附解諸乘方拋物線形雖萬殊理實一貫諸曲線式備具於圓錐體上故圓錐者二次曲線之母也撱圓利用聚拋物線利用遠雙曲線利用散而其理皆出平圓茍會其通則制器尚象俯仰觀察為用無窮矣今為一一解之如後
  hash: sha256:67c5d62dbdbdbff7bf82fb84be32777c754552ac00d135c3ac6912e2e3787b30
