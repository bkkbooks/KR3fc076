body:
  text: 母輪徑乘橫綫碾初點距直綫未為橫綫為第一數正直線開平方之數自乘再乘以母輪徑之平方根乘之二乘之三除之為第二數負直綫乘第二數母輪徑除之三乘之二除之五除之為第三數正直綫乘第三數母輪徑除之一乘之五乘之四除之七除之為第四數正直綫乘第四數母輪徑除之三乘之七乘之六除之九除之為第五數正順是以下皆如是求至單位下止乃正負并減為半弧天積擺綫以底邊為軸求全體積術本代微積拾級取同腰同高之圓術五乘之八除之即全體積擺綫以底邊為軸求截葢體積術新定置直綫平方開之其平方根之六乘方以母輪徑之平方根除之平圓周率乘之二乘之七除之為第一數直綫乘第一數母輪徑除之一乘之七乘之二除之九除之為第二數直綫乘第二數母輪徑除之三乘之九乘之四除之十一除之為第三數直綫乘第三數母輪徑除之五乘之十一乘之六除之十三除之為第四數順是以下皆如是求至單位下止乃相并為截葢體積
