body:
  text: 丁庚形此辛已丁甲丁庚壬丁庚三形為連比例三率而甲丁庚形原等於甲丑戊形則辛已丁甲丑戊壬丁庚三形亦必為連比例三率此三形本為相等三形則三形上三弦如辛丁甲戊丁壬亦必為連比例三率矣故辛丁乘丁壬必等於甲戊畀也第三解曰以乙甲大半徑為平圓徑作乙卯弧自兌徑辛未作卯午弦又以甲己小半徑為平圓徑作己丑弧又自兌徑丁未作丁辰線則卯午與丁辰必等辛午與丑辰必等其故何也試先作丁寅弦次作丁點切線與引長之大小正徑相遇於子於癸又自丑向心作丑甲自卯向心作卯甲今丙寅與子寅甲寅與乙寅既為四率比例後另有解則丙寅乙寅長方與甲寅子寅長方必相等矣又子寅丁甲午辛丁辰癸為同式三角三形則以子丁比子寅必若甲辛與甲午又甲辛與甲午亦若丁癸與等丁辰之甲寅夫子丁甲壬丁癸本為連比倒三率理詳本論第三解而甲壬等於甲辛則子丁甲辛丁癸亦為連比例三率即子寅甲午里寅甲定等丁辰亦為連比例三率而子寅甲寅長方與甲午正方為等又子寅甲寅長方與
