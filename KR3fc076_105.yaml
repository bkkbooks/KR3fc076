body:
  text: 若雙曲線之規線則長短不齊右長左短與撱圓規線之左長右短者正相反故雙曲線者撱圓之反式也解曰如圖水木火雙線式未為右心乙土為通徑辛為左心木為右頂點庚為左頂點若於木點上作亥木直線令與乙土等又自庚點向亥作庚亢無界斜線則未木橫線乙未直線戍未規線必為連比例三率餘如午木丁午酉午等無不為連比例三率所以然者因雙線本為撱圓之反式撱圓準線上諸線皆趨右心則雙線準線上諸線自皆趨左心撱圓規線頂上一線趨右頂點雙線規線頂上一線亦就趨左頂點矣凡諸曲線式諸規線頂上線與曲線相交於一點此一點上之橫直線為相等左之則直大於橫右之則橫大於直解曰如後第一圖平圓交點在甲則甲乙與乙丙等第二圖撱圓交點在天則天地與地人等如第三圖拋物線交點在子則子丑與丑寅等如第四圖雙曲線交點在金則金木與木水等蓋未率規線既等於中率直線則中率直線自不得不等於首率橫線也
  hash: sha256:ed0973989a164fa60985854c71bc7a35c956523dc1f1d40366bc754362acee39
