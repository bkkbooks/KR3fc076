body:
  text: 綫仍與未申亥土水木同而庚山大於寅工庚元大於寅戶庚天大於寅上諸數雖較大而比例仍同猶之易二兌徑為二正徑成一撱圖式首率直綫大於原式首率未率規綫小於原式未率而兩式之中率仍可相等也次解拋物綫曰拋物綫者撱圓之極式也如圓拋物綫式任作切線水木切點在土應自午作過中心綫為大兌徑而拋物綫之中心遠在遠窮為不可得故撱圓圖中甲乙大兌徑變為此圖土天平綫又過針心申作牛酉綫與水土平行則牛酉即斜通徑取水土如牛酉又自水作水張與土天平行則以首率土栁乘未率房栁開平方必得中率井栁夫撱圓圖中土乙為斜綫而此圖水張為平行者亦因拋物綫式無所謂乙點故水張不得不與軸平行也而牛亥等於亥酉亥土與牛酉之比例必仍若一與四矣後另有解亥土與牛酉仍若一與四何也如前圖牛酉房栁等乘土栁等於井栁畀即牛酉乘亥土亦等於牛亥畀夫以本
