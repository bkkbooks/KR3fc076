body:
  text: 線仍與未申亥土水木同而庚山大於寅工庚元大於寅戶庚天大於寅上諸數雖較大而比例仍同猶之易二兌徑為二正徑成一撱圖式首率直線大於原式首率未率規線小於原式未率而兩式之中率仍可相等也次解拋物線曰拋物線者撱圓之極式也如圓拋物線式任作切線水木切點在土應自午作過中心線為大兌徑而拋物線之中心遠在遠窮為不可得故撱圓圖中甲乙大兌徑變為此圖土天平線又過針心申作牛酉線與水土平行則牛酉即斜通徑取水土如牛酉又自水作水張與土天平行則以首率土栁乘未率房栁開平方必得中率井栁夫撱圓圖中土乙為斜線而此圖水張為平行者亦因拋物線式無所謂乙點故水張不得不與軸平行也而牛亥等於亥酉亥土與牛酉之比例必仍若一與四矣後另有解亥土與牛酉仍若一與四何也如前圖牛酉房栁等乘土栁等於井栁畀即牛酉乘亥土亦等於牛亥畀夫以本
  hash: sha256:8a58aa027df26c768e7db2c55361cd0d7e75cb70322040d02b53f03cc7ba9e09
