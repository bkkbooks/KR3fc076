body:
  text: 必小於午牛斗午而兩徑為不同矣夫兩徑不同之謂撱圓故諸午點必攢成撱圓周也圓錐上與斜線平行之截面何以必為拋物面也解曰如前第一圖令稍旋轉則第一圖上丑午易為本圖上丑午圓錐右轉故丑午亦右移也丑午右移則甲井丙拋物面之半乃可得見蓋甲井曲線正視之為一直線旁視之乃為曲線然依此則諸例難明故令丑午仍復本位作後圖如圖丑卯午圓錐丑卯丑午卯午皆等自甲截至丙令截面與丑午平行則甲井丙形為拋物面之半金木水火丙井皆拋物面縱線甲金甲水甲丙皆拋物面橫線甲為頂點甲子即其通徑金寅水辰丙午皆等通徑諸例見後第四論準拋物線例以通徑乘橫線必等於縱線平方詳後第四論又平圓上正矢
