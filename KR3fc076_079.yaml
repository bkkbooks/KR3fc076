body:
  text: 準此則知本圖上惟直線乃為正交雙線若所截雙線面稍斜而左右則頂角即鋭其截面之大小徑即不能等也準此則知正交雙線面惟直角圓錐上有此形其他圓錐上不能有也而雙線之於正交雙線猶之撱圓之於平圓矣由是而知圓錐上有七式曰點點之撱者曰線曰平圓平圓之撱者曰撱圓曰正交雙曲線正交雙曲線之撱圓者曰變曲線曰拋物線止一式無所謂正撱而七式備具於直角圓錐是故橫截之圓面其平與撱係於雖之底靣底面平則亦平底面撱則亦撱直截之雙線面其正交與斜交係於錐之頂角頂角正交則亦正交頂角斜交即亦斜交
