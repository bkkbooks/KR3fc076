body:
  text: 人火縱綫之法也以此推之壬水為壬土寅半周上正矢水寅為其大矢亦即正交雙綫水點上之正矢大矢準正交雙線倒以等壬水之危寅正矢加水危徑得水寅大矢乙金為乙巳丙半周上正矢金丙為其大矢亦即正交雙線金點上之正矢大矢準正交雙綫例以等乙金之亢丙正矢加金亢徑得金丙大矢其求縱綫之例自無不與正交雙綫之算例合而此截面之必焉正交雙綫面也又何疑乎試更以上圖之圓錐旋轉之為下圖則上圖甲巳易為下圖庚癸上圖甲乙易為下圖庚未上圖截積一叚盡去之則正視所見之戊尾午面為正交雙綫面庚尾為直半徑申尾或尾戍為橫半徑橫直二半徑等則橫直二徑亦必等庚辛及庚癸為二漸近綫曲綫之戊午二點引長之愈長則愈近於庚辛庚癸二綫而永不能遇故名之曰漸近綫也此式之二漸近綫為十字正交故名曰正交雙曲線而此式為平圓反式準此則知前條圓錐圖上所直截面例與此同惟斜綫上小句股形皆股大於句直者股橫者句此因頂角不為直角而為銳角故二漸近綫交角亦為銳角不得謂之正角倘所截雙綫面稍斜而左右則頂角愈銳直徑愈大於橫徑其兩徑之較愈大故前條圓錐圖上所直截面其大小徑之較為最小也
