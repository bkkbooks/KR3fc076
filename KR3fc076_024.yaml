body:
  text: 拋物線拋物線求弧背術一本代微積拾級正弦乘法線通徑除之於上另置正弦法線相加半通徑除之求其訥氐對數以通徑四之一乘之以加上位即拋物線弧背按右術任正弦極大皆可求若正弦甚小於半通徑則為負對數而加減之例淆矣茲復立遞加數術求之正弦愈小降位愈易正以濟右術之窮也術如左拋物線求弧背術二新定正弦為第一數正次置第一數以正弦畀乘之半通徑畀除之二除之三除之為第二數正次置第二數以正弦畀乘之半通徑畀除之一乘之三乘之四除之五除也為第三數負次置第三數以正弦畀乘之半通徑畀除之三乘之五乘之六除之七除之為第四數正順是以下皆如是求至單位下止乃正負並減為拋物線弧背凡正弦大於半通徑則此術不能求拋物線求截蓋殼積術一本代微積拾級半通徑立方減法線立方以半通徑除之倍之為第一數四分第一數之一二除之三除之為第二數四分數二數之一九乘之四除之五除之為第三數四分第三
