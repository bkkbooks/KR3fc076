body:
  text: 大徑平行交圓周於丙戊二點又自乙點作丁已切線亦與大徑平行交平圓周於丁已二點未作丙丁直線截引長大徑於右作戊己直線截引長大徑於左則左右即兩心差夫左戊與左土之比例本同於大小徑之比例而左戊為小半徑是以大半徑比小半徑若小半徑左戊與半通徑左土也而大半徑與小半徑與半通徑原為連比例三率故有此圖算式
